<style>
.navbar {

.navbar > .pill.nav-pill-links .pill-inner { width: 100%; padding: 0 16px; }

}
.navbar > .pill.nav-pill-links .nav-links::-webkit-scrollbar { display: none; height: 0; }

.navbar > .pill + .pill { margin-left: -8px; }
.navbar .nav-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; color: #fff; font-family: var(--nav-font); font-size: 13px; font-weight: 700; letter-spacing: 1px; }
.navbar .nav-logo img { width: 28px; height: 28px; border-radius: 6px; }
.navbar .nav-links { display: flex; align-items: center; gap: 24px; }
.navbar .nav-link { color: var(--nav-muted); text-decoration: none; font-family: var(--nav-font); font-size: 11px; font-weight: 500; letter-spacing: 0.5px; transition: color .15s; white-space: nowrap; }
.navbar .nav-link:hover { color: var(--nav-cyan); }
.navbar .nav-link.active { color: var(--nav-cyan); }
.navbar .nav-link.accent-red    { color: var(--nav-red);    font-weight: 700; }
.navbar .nav-link.accent-red:hover { color: #ff4070; }
.navbar .nav-link.accent-cyan   { color: var(--nav-cyan);   font-weight: 700; }
.navbar .nav-link.accent-cyan:hover { color: #40f8ff; }
.navbar .nav-link.accent-purple { color: var(--nav-purple); font-weight: 700; }
.navbar .nav-link.accent-purple:hover { color: #d040ff; }
.navbar .nav-socials { display: flex; gap: 12px; align-items: center; }
.navbar .nav-social { color: var(--nav-muted); text-decoration: none; font-size: 16px; transition: color .15s; }
.navbar .nav-social:hover { color: var(--nav-cyan); }
.navbar .pill { position: relative; display: inline-flex; align-items: center; height: 44px; padding: 0; background: linear-gradient(180deg, rgba(0,255,65,0.04), rgba(0,255,65,0)); clip-path: polygon(16px 0, calc(100% - 16px) 0, 100% 100%, 0 100%); border: 0; }
.navbar .pill::before { content: ''; position: absolute; inset: 0; clip-path: polygon(16px 0, calc(100% - 16px) 0, 100% 100%, 0 100%); background: linear-gradient(var(--nav-panel), var(--nav-panel)) padding-box, linear-gradient(180deg, rgba(0,240,255,0.35), rgba(0,255,65,0.15)) border-box; border: 1px solid transparent; z-index: 0; }
.navbar .pill-inner { position: relative; z-index: 1; display: inline-flex; align-items: center; gap: 18px; padding: 0 22px; height: 44px; white-space: nowrap; }
.navbar .pill-reverse { clip-path: polygon(0 0, 100% 0, calc(100% - 16px) 100%, 16px 100%); }
.navbar .pill-reverse::before { clip-path: polygon(0 0, 100% 0, calc(100% - 16px) 100%, 16px 100%); }
.navbar .font-display { font-family: var(--nav-display); letter-spacing: 2px; }
.mobile-menu-btn { display: none; background: none; border: 1px solid var(--nav-border); color: var(--nav-text); font-size: 14px; cursor: pointer; padding: 6px 10px; border-radius: 4px; margin-left: 8px; }
.mobile-menu { display: none; position: fixed; top: 72px; left: 0; right: 0; background: #0d1117; border-bottom: 1px solid rgba(0, 255, 65, 0.12); padding: 8px; z-index: 999; flex-direction: column; gap: 2px; max-height: 70vh; overflow-y: auto; }
.mobile-menu.open { display: flex; }
.mobile-menu a { color: #e6edf3; text-decoration: none; font-size: 11px; padding: 10px 12px; border-radius: 4px; transition: background 0.1s; font-family: 'JetBrains Mono', monospace; }
.mobile-menu a:hover { background: rgba(255,255,255,0.04); }
.mobile-menu a.active { color: var(--nav-cyan); background: rgba(0,209,255,0.1); }
@media (max-width: 900px) {
  .navbar .nav-links { display: none; }
  .mobile-menu-btn { display: block; }
}

<script>

  const menu = document.getElementById('mobileMenu');

(function(){
  var p = location.pathname.split('/').pop().toLowerCase();
  if (p === 'rugsheet-dev.html') p = 'rugsheet.html';
  document.querySelectorAll('#mobileMenu a, .nav-links a, .nav-link').forEach(function(a){
    var h = (a.getAttribute('href')||'').replace('./','').toLowerCase();
    if (h && h === p) a.classList.add('active');
  });
})();
</script>
