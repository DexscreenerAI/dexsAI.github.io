<script>
const CATALOG = [
  "https://i.ibb.co/232W3QSG/IMG-9519.jpg",
  "https://i.ibb.co/vxvMsbdc/IMG-9524.jpg",
  "https://i.ibb.co/v6WbxrKQ/IMG-9533.jpg",
];
const API_KEY = "tgp_v1__-BumDi3dVUXnhbab602R5tZlhpZW6blob7nHStvpUk";
const VISION_API = "https://dexscreener-telegram-bot-production.up.railway.app/api/vision";
const STYLES = [
  { id:"photorealistic", label:"Photorealistic", icon:"📸", suffix:"photorealistic, 8k, cinematic lighting, film photography" },
  { id:"cartoon", label:"Cartoon", icon:"🎨", suffix:"Pixar style 3D cartoon, vibrant colors, stylized, fun" },
  { id:"anime", label:"Anime", icon:"⛩️", suffix:"anime style, detailed illustration, vivid colors" },
  { id:"oil_painting", label:"Painting", icon:"🖼️", suffix:"oil painting on canvas, dramatic brushstrokes, classical art style" },
  { id:"3d_render", label:"3D Render", icon:"💠", suffix:"3D render, octane render, volumetric lighting, ultra detailed" },
  { id:"comic", label:"Comic", icon:"💥", suffix:"comic book style, bold ink outlines, halftone dots, dynamic" },
];

const V = {
  bg:"#060a10", bg2:"#0b1018", bg3:"#101822",
  card:"#111a26", cb:"#1a2636",
  cy:"#00d4ff", cd:"rgba(0,212,255,0.12)",
  gr:"#00ff88", rd:"#ff3b4f", yl:"#ffaa00",
  t:"#dfe4ed", t2:"rgba(255,255,255,0.50)", t3:"rgba(255,255,255,0.22)",
  m:"'JetBrains Mono',monospace", s:"'DM Sans',sans-serif",
};

// ═══════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════
let pickedScenes = [];
let uploadedScenes = [];
let charFile = null, charPreview = null, charSource = null;
let selectedStyle = "photorealistic";
let results = [];
let loading = false, stepText = "", errText = "";
let history = [];
let showSelectGallery = false;
let viewingResult = null;

function allScenes() {
  return [...CATALOG, ...uploadedScenes.map(s => s.url)];
}

function esc(s){ const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

function secLabel(t, extra=''){
  return `<div style="font-family:${V.m};font-size:9px;letter-spacing:2.5px;color:${V.cy};margin-bottom:10px;font-weight:600;display:flex;align-items:center;gap:8px;"><span>${t}</span><div style="flex:1;height:1px;background:${V.cb};"></div>${extra}</div>`;
}

// ═══════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════
function render(){
  const scenes = allScenes();
  const ready = pickedScenes.length > 0 && !!charPreview;
  const sceneCount = pickedScenes.length;

  document.getElementById('app').innerHTML = `
  <div style="min-height:100vh;background:${V.bg};color:${V.t};font-family:${V.s};-webkit-font-smoothing:antialiased;position:relative;overflow:hidden;">
    <div style="position:fixed;top:-40%;left:50%;transform:translateX(-50%);width:120%;height:60%;background:radial-gradient(ellipse at center,rgba(0,212,255,0.04) 0%,transparent 70%);pointer-events:none;z-index:0;"></div>
    <div style="position:relative;z-index:1;max-width:480px;margin:0 auto;padding:0 16px 80px;">

      <!-- HEADER -->
      <div style="padding:80px 0 20px;">
        <div style="display:flex;align-items:center;gap:12px;">
          <div style="width:40px;height:40px;border-radius:10px;background:${V.cd};border:1px solid rgba(0,212,255,0.2);display:flex;align-items:center;justify-content:center;flex-shrink:0;">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="${V.cy}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
          </div>
          <div>
            <div style="font-family:${V.m};font-size:18px;font-weight:700;color:#fff;letter-spacing:2px;">SCENE REMIXER</div>
            <div style="font-family:${V.m};font-size:8px;letter-spacing:3px;color:${V.cy};margin-top:1px;font-weight:600;">DEXSCREENER AI STUDIO</div>
          </div>
        </div>
        <p style="color:${V.t2};font-size:12px;margin:12px 0 0;">Pick scenes · Upload your character · AI generates one image per scene</p>
        <div style="height:1px;background:linear-gradient(90deg,${V.cy}44,transparent);margin-top:16px;"></div>
      </div>

      <div style="display:flex;flex-direction:column;gap:24px;">

        <!-- ═══ 01 CHARACTER ═══ -->
        <div>
          ${secLabel("01 — YOUR CHARACTER")}
          <div style="font-size:11px;color:${V.t2};margin-bottom:12px;">Upload the person to insert into scenes</div>
          <input type="file" id="fileInput" accept="image/*" onchange="handleCharUpload(event)" style="display:none;">
          ${charPreview?`
          <div style="position:relative;display:flex;align-items:center;gap:12px;background:${V.card};border:1px solid ${V.cy};border-radius:8px;padding:10px;box-shadow:0 0 16px ${V.cd};">
            <img src="${charPreview}" style="width:56px;height:56px;object-fit:cover;border-radius:8px;border:1px solid ${V.cb};">
            <div style="flex:1;min-width:0;">
              <div style="font-size:12px;color:${V.t};overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${charFile?esc(charFile.name):''}</div>
              <div style="font-size:10px;color:${V.gr};font-family:${V.m};margin-top:2px;">✓ READY</div>
            </div>
            <button onclick="document.getElementById('fileInput').click()" style="background:${V.bg2};border:1px solid ${V.cb};color:${V.t2};padding:8px 10px;cursor:pointer;border-radius:6px;display:flex;align-items:center;">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
            </button>
            <button onclick="clearChar(event)" style="position:absolute;top:-6px;right:-6px;width:22px;height:22px;border-radius:50%;background:${V.rd};border:2px solid ${V.bg};color:#fff;font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:${V.m};font-weight:700;z-index:2;">✕</button>
          </div>
          `:`
          <button onclick="document.getElementById('fileInput').click()" style="width:100%;padding:28px 16px;background:${V.bg2};border:1px dashed ${V.cb};border-radius:8px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:8px;font-family:${V.s};transition:all .2s;">
            <div style="width:48px;height:48px;border-radius:12px;background:${V.card};border:1px solid ${V.cb};display:flex;align-items:center;justify-content:center;">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="${V.t3}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            </div>
            <span style="color:${V.t2};font-size:12px;font-weight:600;">Upload your character</span>
            <span style="color:${V.t3};font-size:9px;font-family:${V.m};">PNG, JPG, WEBP</span>
          </button>
          `}
        </div>

        <!-- ═══ 02 SCENES (multi-select + upload) ═══ -->
        <div>
          ${secLabel("02 — SCENES", `<span style="color:${sceneCount>0?V.gr:V.t3};font-size:9px;font-family:${V.m};">${sceneCount} selected</span>`)}
          <div style="font-size:11px;color:${V.t2};margin-bottom:12px;">Select multiple scenes or upload your own</div>
          <input type="file" id="sceneFileInput" accept="image/*" multiple onchange="handleSceneUpload(event)" style="display:none;">

          <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;">
            ${scenes.map((url,i)=>{
              const active = pickedScenes.includes(i);
              const idx = pickedScenes.indexOf(i);
              const isCustom = i >= CATALOG.length;
              return `<div onclick="toggleScene(${i})" style="position:relative;cursor:pointer;border-radius:8px;overflow:hidden;border:${active?`2px solid ${V.cy}`:`1px solid ${V.cb}`};box-shadow:${active?`0 0 16px ${V.cd}`:'none'};transition:all .25s ease;aspect-ratio:1;background:${V.bg2};">
                <img src="${url}" style="width:100%;height:100%;object-fit:cover;display:block;filter:${active?'brightness(0.85)':'brightness(0.5) saturate(0.4)'};transition:filter .25s;">
                ${active?`
                  <div style="position:absolute;top:5px;right:5px;background:${V.cy};border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;box-shadow:0 0 10px ${V.cy};font-family:${V.m};font-size:10px;font-weight:700;color:#000;">${idx+1}</div>
                  <div style="position:absolute;top:0;left:0;right:0;height:30%;background:linear-gradient(180deg,rgba(0,212,255,0.08),transparent);animation:scanline 2.5s ease-in-out infinite;pointer-events:none;"></div>
                `:''}
                ${isCustom?`<button onclick="removeScene(event,${i})" style="position:absolute;top:5px;left:5px;width:18px;height:18px;border-radius:50%;background:${V.rd};border:1px solid ${V.bg};color:#fff;font-size:9px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:${V.m};font-weight:700;z-index:2;">✕</button>`:''}
              </div>`;
            }).join('')}

            <!-- Upload scene card -->
            <button onclick="document.getElementById('sceneFileInput').click()" style="aspect-ratio:1;background:${V.bg2};border:1px dashed ${V.cb};border-radius:8px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;font-family:${V.s};transition:all .2s;">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="${V.t3}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
              <span style="color:${V.t3};font-size:8px;font-family:${V.m};letter-spacing:1px;">ADD</span>
            </button>
          </div>
        </div>

        <!-- ═══ 03 STYLE ═══ -->
        <div>
          ${secLabel("03 — STYLE")}
          <div style="display:flex;flex-wrap:wrap;gap:6px;">
            ${STYLES.map(s=>{
              const a=selectedStyle===s.id;
              return `<button onclick="pickStyle('${s.id}')" style="padding:8px 14px;font-size:11px;font-weight:600;font-family:${V.m};border:1px solid ${a?V.cy:V.cb};border-radius:6px;cursor:pointer;color:${a?V.cy:V.t2};background:${a?V.cd:V.bg2};transition:all .2s;letter-spacing:.5px;">${s.icon} ${s.label}</button>`;
            }).join('')}
          </div>
        </div>

        <!-- ═══ GENERATE ═══ -->
        <button onclick="generate()" ${loading||!ready?'disabled':''} style="width:100%;padding:16px;border:none;border-radius:8px;background:linear-gradient(135deg,${V.cy},#0090b3);color:#000;font-size:13px;font-weight:700;letter-spacing:3px;cursor:${loading?'wait':!ready?'not-allowed':'pointer'};font-family:${V.m};box-shadow:0 4px 24px rgba(0,212,255,0.2);transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px;opacity:${!ready?'0.35':'1'};">
          ${loading?`
            <span style="display:flex;align-items:center;justify-content:center;gap:10px;">
              <span style="display:inline-block;width:14px;height:14px;border:2px solid rgba(0,0,0,0.3);border-top-color:#000;border-radius:50%;animation:spin .7s linear infinite;"></span>
              <span style="font-family:${V.m};font-size:11px;letter-spacing:1px;">${stepText}</span>
            </span>
          `:`
            <span style="display:flex;align-items:center;justify-content:center;gap:8px;">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
              GENERATE${sceneCount>1?' ('+sceneCount+' IMAGES)':''}
            </span>
          `}
        </button>

        <!-- ERROR -->
        ${errText?`<div style="background:rgba(255,59,79,0.06);border:1px solid rgba(255,59,79,0.2);border-radius:8px;padding:10px 14px;display:flex;flex-direction:column;gap:4px;"><span style="color:${V.rd};font-family:${V.m};font-size:10px;font-weight:600;">ERROR</span><span style="color:rgba(255,59,79,0.8);font-size:11px;">${esc(errText)}</span></div>`:''}

        <!-- ═══ RESULTS ═══ -->
        ${results.length>0?`
        <div>
          ${secLabel("RESULTS", `<span style="color:${V.gr};font-size:9px;font-family:${V.m};">${results.length} image${results.length>1?'s':''}</span>`)}
          <div style="display:flex;flex-direction:column;gap:12px;">
            ${results.map((r,ri)=>`
            <div style="background:${V.card};border:1px solid ${V.cb};border-radius:10px;padding:12px;animation:fadeUp .35s ease;">
              <div style="display:flex;align-items:center;gap:6px;margin-bottom:10px;">
                <div style="width:6px;height:6px;border-radius:50%;background:${V.gr};box-shadow:0 0 8px ${V.gr};"></div>
                <span style="font-family:${V.m};font-size:10px;color:${V.gr};letter-spacing:1.5px;font-weight:600;">SCENE ${ri+1}/${results.length}</span>
              </div>
              <img src="${r.img}" style="width:100%;border-radius:6px;display:block;border:1px solid ${V.cb};">
              <div style="display:flex;gap:8px;margin-top:10px;">
                <button onclick="downloadOne(${ri})" style="flex:1;padding:10px;background:${V.cd};color:${V.cy};border:1px solid rgba(0,212,255,0.25);border-radius:6px;font-size:10px;font-weight:700;cursor:pointer;font-family:${V.m};letter-spacing:1px;display:flex;align-items:center;justify-content:center;gap:6px;">
                  <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>DOWNLOAD
                </button>
              </div>
            </div>`).join('')}
          </div>
          ${results.length>1?`
          <button onclick="downloadAll()" style="width:100%;margin-top:10px;padding:14px;background:${V.bg2};color:${V.cy};border:1px solid ${V.cb};border-radius:8px;font-size:11px;font-weight:700;cursor:pointer;font-family:${V.m};letter-spacing:2px;display:flex;align-items:center;justify-content:center;gap:8px;">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            DOWNLOAD ALL (${results.length})
          </button>`:''}
        </div>`:''}

        <!-- HISTORY -->
        ${history.length>0?`<div>${secLabel("HISTORY")}<div style="display:flex;gap:8px;overflow-x:auto;padding-bottom:8px;">${history.map(h=>`<img src="${h.img}" onclick="viewHistImg('${h.ts}')" style="width:56px;height:56px;object-fit:cover;border-radius:6px;border:1px solid ${V.cb};cursor:pointer;flex-shrink:0;opacity:0.55;transition:all .2s;">`).join('')}</div></div>`:''}

      </div>

      <div style="text-align:center;padding:32px 0 16px;border-top:1px solid ${V.cb};margin-top:32px;">
        <span style="font-family:${V.m};font-size:9px;color:${V.t3};letter-spacing:2px;">POWERED BY DEXSCREENER AI × CLAUDE × FLUX</span>
      </div>
    </div>
  </div>`;
}

// ═══════════════════════════════════════════
// ACTIONS
// ═══════════════════════════════════════════
function toggleScene(i){
  const idx = pickedScenes.indexOf(i);
  if(idx>=0) pickedScenes.splice(idx,1);
  else pickedScenes.push(i);
  results=[]; errText=""; render();
}

function removeScene(e,i){
  e.stopPropagation();
  pickedScenes = pickedScenes.filter(p=>p!==i).map(p=>p>i?p-1:p);
  const ci = i - CATALOG.length;
  if(ci>=0) uploadedScenes.splice(ci,1);
  results=[]; render();
}

function handleSceneUpload(e){
  const files = Array.from(e.target.files);
  if(!files.length) return;
  let loaded = 0;
  files.forEach(f=>{
    const r = new FileReader();
    r.onload = ev => {
      uploadedScenes.push({ url: ev.target.result, name: f.name });
      const newIdx = CATALOG.length + uploadedScenes.length - 1;
      pickedScenes.push(newIdx);
      loaded++;
      if(loaded===files.length){ results=[]; render(); }
    };
    r.readAsDataURL(f);
  });
  e.target.value='';
}

function handleCharUpload(e){
  const f=e.target.files[0]; if(!f)return;
  charFile=f; charSource='upload'; charPreview=null; results=[];
  const r=new FileReader();
  r.onload=ev=>{ charPreview=ev.target.result; render(); };
  r.readAsDataURL(f);
}

function clearChar(e){
  e.stopPropagation();
  charPreview=null; charFile=null; charSource=null; results=[];
  render();
}

function pickStyle(id){ selectedStyle=id; results=[]; render(); }

function downloadOne(i){
  if(!results[i]) return;
  const a=document.createElement('a'); a.href=results[i].img; a.download=`remix-scene${i+1}-${Date.now()}.png`; a.click();
}
function downloadAll(){
  results.forEach((r,i)=>{
    setTimeout(()=>{
      const a=document.createElement('a'); a.href=r.img; a.download=`remix-scene${i+1}-${Date.now()}.png`; a.click();
    }, i*300);
  });
}

function viewHistImg(ts){
  const h=history.find(x=>String(x.ts)===ts);
  if(h){ results=[{img:h.img,ts:h.ts}]; render(); }
}

// ═══════════════════════════════════════════
// IMAGE COMPRESSION — resize to max 800px, JPEG 0.6
// Reduces payload from ~5MB to ~100KB
// ═══════════════════════════════════════════
function compressImage(dataUrl, maxSize=800, quality=0.6){
  return new Promise((resolve)=>{
    const img=new Image();
    img.onload=()=>{
      const canvas=document.createElement('canvas');
      let w=img.width, h=img.height;
      if(w>h){ if(w>maxSize){h=Math.round(h*maxSize/w);w=maxSize;} }
      else { if(h>maxSize){w=Math.round(w*maxSize/h);h=maxSize;} }
      canvas.width=w; canvas.height=h;
      const ctx=canvas.getContext('2d');
      ctx.drawImage(img,0,0,w,h);
      const compressed=canvas.toDataURL('image/jpeg',quality);
      resolve(compressed);
    };
    img.onerror=()=>resolve(dataUrl); // fallback to original
    img.src=dataUrl;
  });
}

// ═══════════════════════════════════════════
// GENERATE — via Railway backend (no CORS)
// ═══════════════════════════════════════════
async function generate(){
  if(pickedScenes.length===0||!charPreview||loading) return;
  loading=true; errText=""; results=[];
  const scenes = allScenes();
  const style = STYLES.find(s=>s.id===selectedStyle);
  const total = pickedScenes.length;

  try {
    // Compress character image once
    stepText='Compressing images...'; render();
    const compressedChar = await compressImage(charPreview);
    const charB64 = compressedChar.split(",")[1];
    const charContent = {type:"image",source:{type:"base64",media_type:"image/jpeg",data:charB64}};

    for(let si=0; si<total; si++){
      const sceneIdx = pickedScenes[si];
      const sceneUrl = scenes[sceneIdx];
      const isDataUrl = sceneUrl.startsWith('data:');

      let sceneContent;
      if(isDataUrl){
        // Compress uploaded scenes too
        const compressedScene = await compressImage(sceneUrl);
        const sb64 = compressedScene.split(",")[1];
        sceneContent = {type:"image",source:{type:"base64",media_type:"image/jpeg",data:sb64}};
      } else {
        // Catalog scenes — use URL (no base64 needed)
        sceneContent = {type:"image",source:{type:"url",url:sceneUrl}};
      }

      // Step 1: Claude via Railway backend proxy (no CORS issue)
      stepText=`Analyzing scene ${si+1}/${total}...`; render();
      const res = await fetch(VISION_API,{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
          max_tokens:400,
          messages:[{role:"user",content:[
            sceneContent,
            charContent,
            {type:"text",text:`IMAGE 1 = a reference scene. IMAGE 2 = a character/subject.\n\nYour job: write ONE image generation prompt that recreates the EXACT same scene, composition, framing, lighting, mood, setting, and pose from IMAGE 1 — but replace the main subject with the character from IMAGE 2.\n\nDescribe the character from IMAGE 2 in extreme visual detail (species, colors, clothing, accessories, expression, features).\nDescribe the scene from IMAGE 1 in extreme detail (setting, lighting, camera angle, mood, composition, background elements).\n\nCombine both into a single cohesive prompt. Add this style suffix at the end: ${style.suffix}\n\nOutput ONLY the raw prompt. No preamble, no explanation.`}
          ]}]
        })
      });
      if(!res.ok){
        const txt=await res.text();
        throw new Error(`Scene ${si+1}: Server ${res.status} — ${txt.slice(0,100)}`);
      }
      const d=await res.json();
      if(d.error) throw new Error(`Scene ${si+1}: ${d.error.message || d.error}`);
      const prompt=(d.content||[]).map(c=>c.text||"").join("").trim();

      // Step 2: FLUX generate (Together.xyz — no CORS issue)
      stepText=`Generating image ${si+1}/${total}...`; render();
      const imgRes = await fetch("https://api.together.xyz/v1/images/generations",{
        method:"POST",
        headers:{"Content-Type":"application/json",Authorization:`Bearer ${API_KEY}`},
        body:JSON.stringify({model:"black-forest-labs/FLUX.1-schnell",prompt,width:768,height:768,steps:4,n:1,response_format:"b64_json"})
      });
      const imgD=await imgRes.json();
      if(imgD.error) throw new Error(`Scene ${si+1}: ${imgD.error.message||JSON.stringify(imgD.error)}`);

      const img=`data:image/png;base64,${imgD.data[0].b64_json}`;
      results.push({img,sceneUrl,ts:Date.now()});
      history.unshift({img,ts:Date.now()});
      render();
    }

    if(history.length>30) history=history.slice(0,30);
  } catch(e) {
    errText=e.message;
  }
  loading=false; stepText=""; render();
}
