/* ═══════════════════════════════════════════════════════
   NAVBAR — canonical block. Self-contained, uses its own
   --nav-* vars so it renders identically on pages that
   don't define the site-wide palette.
   ═══════════════════════════════════════════════════════ */
.navbar {
  --nav-bg: rgba(5, 6, 8, 0.88);
  --nav-border: rgba(0, 255, 65, 0.12);
  --nav-panel: #0d1117;
  --nav-text: #e6edf3;
  --nav-muted: rgba(255, 255, 255, 0.55);
  --nav-cyan: #00d1ff;
  --nav-green: #00ff80;
  --nav-red: #ff3b4f;
  --nav-purple: #b388ff;
  --nav-font: 'JetBrains Mono', 'Courier New', monospace;
  --nav-display: 'Orbitron', 'JetBrains Mono', monospace;

  position: fixed; top: 0; left: 0; right: 0;
  background: var(--nav-bg);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid var(--nav-border);
  display: flex; align-items: center; justify-content: flex-start;
  gap: 0; padding: 8px 16px; z-index: 1000; min-height: 56px;
}
.navbar > .pill { flex-shrink: 0; }
.navbar > .pill.nav-pill-links { flex: 1 1 auto; min-width: 0; }
.navbar > .pill.nav-pill-links .pill-inner { width: 100%; padding: 0 16px; }
.navbar > .pill.nav-pill-links .nav-links {
  overflow-x: auto; overflow-y: hidden; scrollbar-width: none;
  -webkit-overflow-scrolling: touch; max-width: 100%;
}
.navbar > .pill.nav-pill-links .nav-links::-webkit-scrollbar { display: none; height: 0; }
.navbar > .pill.nav-pill-links .nav-links > a { flex-shrink: 0; }
.navbar > .pill + .pill { margin-left: -8px; }

.navbar .nav-logo {
  display: flex; align-items: center; gap: 10px;
  text-decoration: none; color: #fff;
  font-family: var(--nav-font); font-size: 13px; font-weight: 700; letter-spacing: 1px;
}
.navbar .nav-logo img { width: 28px; height: 28px; border-radius: 6px; }

.navbar .nav-links { display: flex; align-items: center; gap: 24px; }

.navbar .nav-link {
  color: var(--nav-muted); text-decoration: none;
  font-family: var(--nav-font); font-size: 11px; font-weight: 500; letter-spacing: 0.5px;
  transition: color .15s; white-space: nowrap;
}
.navbar .nav-link:hover { color: var(--nav-cyan); }
.navbar .nav-link.active { color: var(--nav-cyan); }

.navbar .nav-link.accent-red    { color: var(--nav-red);    font-weight: 700; }
.navbar .nav-link.accent-red:hover { color: #ff4070; }
.navbar .nav-link.accent-cyan   { color: var(--nav-cyan);   font-weight: 700; }
.navbar .nav-link.accent-cyan:hover { color: #40f8ff; }
.navbar .nav-link.accent-purple { color: var(--nav-purple); font-weight: 700; }
.navbar .nav-link.accent-purple:hover { color: #d040ff; }

.navbar .nav-socials { display: flex; gap: 12px; align-items: center; }
.navbar .nav-social {
  color: var(--nav-muted); text-decoration: none; font-size: 16px; transition: color .15s;
}
.navbar .nav-social:hover { color: var(--nav-cyan); }

/* Angled pill wrapper */
.navbar .pill {
  position: relative; display: inline-flex; align-items: center;
  height: 44px; padding: 0;
  background: linear-gradient(180deg, rgba(0,255,65,0.04), rgba(0,255,65,0));
  clip-path: polygon(16px 0, calc(100% - 16px) 0, 100% 100%, 0 100%);
  border: 0;
}
.navbar .pill::before {
  content: ''; position: absolute; inset: 0;
  clip-path: polygon(16px 0, calc(100% - 16px) 0, 100% 100%, 0 100%);
  background:
    linear-gradient(var(--nav-panel), var(--nav-panel)) padding-box,
    linear-gradient(180deg, rgba(0,240,255,0.35), rgba(0,255,65,0.15)) border-box;
  border: 1px solid transparent; z-index: 0;
}
.navbar .pill-inner {
  position: relative; z-index: 1; display: inline-flex; align-items: center;
  gap: 18px; padding: 0 22px; height: 44px; white-space: nowrap;
}
.navbar .pill-reverse { clip-path: polygon(0 0, 100% 0, calc(100% - 16px) 100%, 16px 100%); }
.navbar .pill-reverse::before { clip-path: polygon(0 0, 100% 0, calc(100% - 16px) 100%, 16px 100%); }

.navbar .font-display { font-family: var(--nav-display); letter-spacing: 2px; }

/* Mobile menu */
.mobile-menu-btn {
  display: none; background: none; border: 1px solid var(--nav-border);
  color: var(--nav-text); font-size: 14px; cursor: pointer;
  padding: 6px 10px; border-radius: 4px; margin-left: 8px;
}
.mobile-menu {
  display: none; position: fixed; top: 72px; left: 0; right: 0;
  background: var(--nav-panel); border-bottom: 1px solid var(--nav-border);
  padding: 8px; z-index: 999; flex-direction: column; gap: 2px;
  max-height: 70vh; overflow-y: auto;
}
.mobile-menu.open { display: flex; }
.mobile-menu a {
  color: var(--nav-text); text-decoration: none; font-size: 11px;
  padding: 10px 12px; border-radius: 4px; transition: background 0.1s;
  font-family: var(--nav-font);
}
.mobile-menu a:hover { background: rgba(255,255,255,0.04); }
.mobile-menu a.active { color: var(--nav-cyan); background: rgba(0,209,255,0.1); }

@media (max-width: 900px) {
  .navbar .nav-links { display: none; }
  .mobile-menu-btn { display: block; }
}

/* Reserve space under the fixed navbar on every page. Pages that already

<script>
const $=id=>document.getElementById(id);
const fN=n=>n>=1e9?(n/1e9).toFixed(2)+'B':n>=1e6?(n/1e6).toFixed(2)+'M':n>=1e3?(n/1e3).toFixed(1)+'K':n.toFixed(0);
const fP=p=>p===0?'$0':p<.0001?'$'+p.toFixed(8):p<.01?'$'+p.toFixed(6):p<1?'$'+p.toFixed(4):'$'+p.toFixed(2);
const esc=s=>(s||'').replace(/</g,'&lt;');
const ts=()=>new Date().toLocaleTimeString('en-US',{hour12:false});

// Design tokens — exact match scene remixer
const C={
  bg:'#060a10',bg2:'#0b1018',bg3:'#101822',
  card:'#111a26',cb:'#1a2636',
  cy:'#ff3b4f',cd:'rgba(255,59,79,0.12)',
  gr:'#ff1744',gd:'rgba(255,23,68,0.1)',
  rd:'#ff3b4f',yl:'#ffaa00',pu:'#a855f7',go:'#ffd700',
  t:'#dfe4ed',t2:'rgba(255,255,255,0.5)',t3:'rgba(255,255,255,0.22)',
  m:"'JetBrains Mono',monospace",s:"'DM Sans',sans-serif"
};

// ═══════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════
let gems=[];
const MAX=10;
let running=true, cycles=0, totalScanned=0, totalPassed=0, startTime=Date.now();
let logs=[];
const valid=['solana','ethereum','base','bsc','arbitrum','polygon','avalanche'];
const rugCache={};

function log(icon,text){
  logs.unshift({t:ts(),icon,text});
  if(logs.length>80)logs.pop();
  render();
}

function secLabel(t,extra=''){
  return `<div style="font-family:${C.m};font-size:9px;letter-spacing:2.5px;color:${C.cy};margin:20px 0 10px;font-weight:600;display:flex;align-items:center;gap:8px;"><span>${t}</span><div style="flex:1;height:1px;background:${C.cb};"></div>${extra}</div>`;
}

// ═══════════════════════════════════════════
// RENDER — same pattern as Scene Remixer
// ═══════════════════════════════════════════
function render(){
  const elapsed=Math.floor((Date.now()-startTime)/1000);
  const mm=Math.floor(elapsed/60),ss=elapsed%60;
  const uptime=mm>0?`${mm}m${ss}s`:`${ss}s`;

  $('app').innerHTML=`
  <div style="min-height:100vh;background:${C.bg};color:${C.t};font-family:${C.s};position:relative;">
    <div style="position:fixed;top:-40%;left:50%;transform:translateX(-50%);width:120%;height:60%;background:radial-gradient(ellipse at center,rgba(255,59,79,0.04) 0%,transparent 70%);pointer-events:none;z-index:0;"></div>
    <div style="position:relative;z-index:1;max-width:520px;margin:0 auto;padding:0 16px 60px;padding-top:64px;">

      <!-- HEADER -->
      <div style="padding:20px 0 16px;">
        <div style="display:flex;align-items:center;gap:12px;">
          <div style="width:40px;height:40px;border-radius:10px;background:${C.cd};border:1px solid rgba(255,59,79,0.2);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:20px;">💎</div>
          <div>
            <div style="font-family:${C.m};font-size:18px;font-weight:700;color:#fff;letter-spacing:2px;">GEM DETECTOR</div>
            <div style="font-family:${C.m};font-size:8px;letter-spacing:3px;color:${C.cy};margin-top:1px;font-weight:600;">$ByeBoss STUDIO</div>
          </div>
        </div>
        <p style="color:${C.t2};font-size:12px;margin:12px 0 0;">Auto-scanning 12+ sources · Top 10 gems · Scores update live</p>
        <div style="height:1px;background:linear-gradient(90deg,${C.cy}44,transparent);margin-top:16px;"></div>
      </div>

      <!-- SCANNER BAR -->
      <div style="background:${C.card};border:1px solid ${C.cb};border-radius:10px;padding:14px 16px;margin-bottom:20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
        <div style="width:8px;height:8px;border-radius:50%;background:${C.gr};animation:blink 1s infinite;flex-shrink:0;"></div>
        <div style="flex:1;min-width:0;font-family:${C.m};font-size:11px;color:${C.t2};overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" id="statusText">Initializing...</div>
        <div style="display:flex;gap:14px;font-family:${C.m};font-size:9px;color:${C.t3};flex-wrap:wrap;">
          <span>Scanned <span style="color:${C.cy};font-weight:600;">${totalScanned}</span></span>
          <span>Passed <span style="color:${C.gr};font-weight:600;">${totalPassed}</span></span>
          <span>Cycle <span style="color:${C.yl};font-weight:600;">${cycles}</span></span>
          <span style="color:${C.t2};">${uptime}</span>
        </div>
      </div>

      <!-- TOP 10 SECTION -->
      ${secLabel('TOP 10 GEMS',`<span style="color:${C.go};font-size:10px;font-weight:700;">${gems.length}</span><span style="color:${C.t3};font-size:9px;">/10</span>`)}

      ${gems.length===0?`
        <div style="text-align:center;padding:50px 20px;">
          <div style="font-size:48px;margin-bottom:16px;opacity:0.6;">💎</div>
          <div style="font-family:${C.m};font-size:11px;color:${C.t3};letter-spacing:1px;">Scanning... gems will appear here</div>
          <div style="margin-top:16px;width:20px;height:20px;border:2px solid ${C.cy};border-top-color:transparent;border-radius:50%;animation:spin .8s linear infinite;margin:16px auto 0;"></div>
        </div>
      `:gems.map((g,i)=>renderGemCard(g,i)).join('')}

      <!-- LOG -->
      ${secLabel('SCANNER LOG',`<span style="color:${C.gr};font-size:9px;">● live</span>`)}
      <div style="background:${C.card};border:1px solid ${C.cb};border-radius:10px;max-height:180px;overflow-y:auto;padding:10px;">
        ${logs.slice(0,30).map(l=>`
          <div style="display:flex;gap:8px;padding:4px 0;border-bottom:1px solid rgba(255,255,255,0.03);font-size:10px;">
            <span style="color:${C.t3};min-width:48px;font-family:${C.m};font-size:9px;">${l.t}</span>
            <span>${l.icon}</span>
            <span style="color:${C.t2};line-height:1.4;">${l.text}</span>
          </div>
        `).join('')}
        ${logs.length===0?`<div style="text-align:center;color:${C.t3};font-size:10px;padding:12px;">Waiting...</div>`:''}
      </div>

      <!-- FOOTER -->
      <div style="text-align:center;padding:28px 0 12px;border-top:1px solid ${C.cb};margin-top:24px;">
        <span style="font-family:${C.m};font-size:9px;color:${C.t3};letter-spacing:2px;">POWERED BY $ByeBoss × RUGCHECK</span>
        <p style="font-size:9px;color:${C.t3};margin-top:6px;">⚠️ DYOR — Not financial advice. Always verify on-chain data.</p>
      </div>

    </div>
  </div>`;
}

function renderGemCard(g,i){
  const rank=i+1;
  const rc=rank===1?`background:linear-gradient(135deg,#ffd700,#ffaa00);color:#000`
    :rank===2?`background:linear-gradient(135deg,#c0c0c0,#a0a0a0);color:#000`
    :rank===3?`background:linear-gradient(135deg,#cd7f32,#b87333);color:#000`
    :`background:${C.bg3};color:${C.t2}`;
  const sc=g.score>=75?C.gr:g.score>=60?C.yl:C.t3;
  const c1=g.chg1h>=0?C.gr:C.rd;
  const c24=g.chg24h>=0?C.gr:C.rd;
  const cbr=g.buyRatio>=60?C.gr:g.buyRatio>=50?C.t:C.yl;
  const rug=g.rugStatus==='good'?'✅':g.rugStatus==='warn'?'⚠️':'❓';
  const isTop3=rank<=3;

  let badges='';
  if(g.age<48)badges+=`<span style="font-size:7px;padding:2px 5px;border-radius:3px;font-family:${C.m};font-weight:600;background:${C.gd};border:1px solid ${C.gr};color:${C.gr};">🆕 ${g.age}h</span>`;
  if(g.src==='boosted')badges+=`<span style="font-size:7px;padding:2px 5px;border-radius:3px;font-family:${C.m};font-weight:600;background:rgba(168,85,247,.15);border:1px solid ${C.pu};color:${C.pu};">🚀 BOOST</span>`;
  if(g.rugStatus==='good')badges+=`<span style="font-size:7px;padding:2px 5px;border-radius:3px;font-family:${C.m};font-weight:600;background:${C.gd};border:1px solid ${C.gr};color:${C.gr};">✅ RUGCHECK OK</span>`;
  else if(g.rugStatus==='warn')badges+=`<span style="font-size:7px;padding:2px 5px;border-radius:3px;font-family:${C.m};font-weight:600;background:rgba(255,170,0,.15);border:1px solid ${C.yl};color:${C.yl};">⚠️ CAUTION</span>`;
  if(g.isCTO)badges+=`<span style="font-size:7px;padding:2px 5px;border-radius:3px;font-family:${C.m};font-weight:600;background:rgba(255,170,0,.15);border:1px solid ${C.yl};color:${C.yl};">👥 CTO</span>`;

  return `<div style="background:${C.card};border:1px solid ${isTop3?'rgba(255,215,0,0.2)':C.cb};border-radius:12px;padding:14px;margin-bottom:10px;position:relative;${isTop3?'background:linear-gradient(135deg,rgba(255,215,0,0.04),transparent);':''}animation:fadeIn .3s ease;">
    <div style="position:absolute;top:-8px;left:14px;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:${C.m};font-size:11px;font-weight:700;${rc};box-shadow:0 3px 10px rgba(0,0,0,.4);">#${rank}</div>
    <!-- score hidden -->

    <div style="display:flex;align-items:center;gap:10px;margin:4px 0 10px;">
      <div style="width:40px;height:40px;border-radius:8px;background:${C.bg3};display:flex;align-items:center;justify-content:center;font-family:${C.m};font-size:16px;font-weight:700;color:${C.cy};overflow:hidden;">${g.logo?`<img src="${g.logo}" style="width:100%;height:100%;object-fit:cover;" onerror="this.style.display='none';this.parentElement.textContent='${g.symbol.charAt(0)}'">`:g.symbol.charAt(0)}</div>
      <div style="flex:1;min-width:0;">
        <div style="font-family:${C.m};font-size:14px;font-weight:700;color:#fff;display:flex;align-items:center;gap:6px;">$${esc(g.symbol)} <span style="font-size:8px;padding:2px 5px;background:${C.bg};border-radius:3px;color:${C.t3};">${g.chain}</span></div>
        <div style="font-size:10px;color:${C.t2};margin-top:1px;">${esc(g.name)}</div>
        ${badges?`<div style="display:flex;gap:4px;margin-top:4px;flex-wrap:wrap;">${badges}</div>`:''}
      </div>
    </div>

    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin-bottom:10px;">
      <div style="background:${C.bg};padding:7px;border-radius:5px;text-align:center;"><div style="font-size:7px;color:${C.t3};font-family:${C.m};letter-spacing:.5px;margin-bottom:2px;">MCAP</div><div style="font-family:${C.m};font-size:11px;font-weight:600;">$${fN(g.mc)}</div></div>
      <div style="background:${C.bg};padding:7px;border-radius:5px;text-align:center;"><div style="font-size:7px;color:${C.t3};font-family:${C.m};letter-spacing:.5px;margin-bottom:2px;">LIQ</div><div style="font-family:${C.m};font-size:11px;font-weight:600;">$${fN(g.liq)}</div></div>
      <div style="background:${C.bg};padding:7px;border-radius:5px;text-align:center;"><div style="font-size:7px;color:${C.t3};font-family:${C.m};letter-spacing:.5px;margin-bottom:2px;">VOL 24H</div><div style="font-family:${C.m};font-size:11px;font-weight:600;">$${fN(g.vol)}</div></div>

// ═══════════════════════════════════════════
// SCORING — from Sniper (no AI needed)
// ═══════════════════════════════════════════
function scoreToken(pair,src){
  const mc=parseFloat(pair.marketCap)||0;
  const liq=parseFloat(pair.liquidity?.usd)||0;
  const vol=parseFloat(pair.volume?.h24)||0;
  const c5=parseFloat(pair.priceChange?.m5)||0;
  const c1=parseFloat(pair.priceChange?.h1)||0;
  const c6=parseFloat(pair.priceChange?.h6)||0;
  const c24=parseFloat(pair.priceChange?.h24)||0;
  const b24=pair.txns?.h24?.buys||0,s24=pair.txns?.h24?.sells||0;
  const b5=pair.txns?.m5?.buys||0,s5=pair.txns?.m5?.sells||0;
  const b1=pair.txns?.h1?.buys||0,s1=pair.txns?.h1?.sells||0;
  const t24=b24+s24,t5=b5+s5;
  const br=t24>0?(b24/t24)*100:50;
  const br5=t5>0?(b5/t5)*100:50;
  const age=pair.pairCreatedAt?(Date.now()-pair.pairCreatedAt)/3600000:999;
  const sym=pair.baseToken?.symbol||'';

  if(mc>10000000||mc<10000)return-1;
  if(liq<5000)return-1;
  if(t24<30)return-1;
  if(br<45)return-1;
  if(c1<-35)return-1;
  if(sym.length<2)return-1;
  if(s5===0&&s1===0&&b5>3&&b1>5)return-1; // honeypot: 0 sells
  if(s24===0&&b24>15)return-1; // honeypot: 0 sells 24h
  const br1h=t5>0?(b5/t5)*100:50;
  if(br1h>97&&t5>8)return-1; // honeypot: ~100% buy ratio

  let sc=20;
  if(src==='boosted')sc+=10;else if(src==='gainer')sc+=7;else if(src==='new')sc+=5;

  if(mc>=10000&&mc<25000)sc+=25;
  else if(mc>=25000&&mc<50000)sc+=23;
  else if(mc<100000)sc+=20;
  else if(mc<200000)sc+=18;
  else if(mc<500000)sc+=14;
  else if(mc<1000000)sc+=8;
  else if(mc<=5000000)sc+=3;

  if(br5>=60)sc+=12;else if(br5>=50)sc+=6;else if(br5<35&&t5>=5)sc-=8;
  if(br>=55)sc+=5;

  const lr=mc>0?(liq/mc)*100:0;
  if(lr>10)sc+=12;else if(lr>5)sc+=7;else if(lr>2)sc+=3;else if(lr<1)sc-=10;

  if(c5>5&&c5<50)sc+=8;
  if(c1>10&&c1<100)sc+=10;else if(c1>0)sc+=4;
  if(c5>80)sc-=10;if(c1>150)sc-=10;if(c5<-20)sc-=8;

  if(age>=4&&age<24)sc+=12;else if(age<72)sc+=8;else if(age<168)sc+=4;else if(age<4)sc+=3;

  const vr=mc>0?(vol/mc):0;
  if(vr>3)sc+=8;else if(vr>1)sc+=5;else if(vr>.3)sc+=2;

  if(t24>500)sc+=6;else if(t24>200)sc+=4;else if(t24>100)sc+=2;

  if(c5>0&&c1>0)sc+=4;
  if(c5>0&&c1>0&&c6>0)sc+=4;
  if(c24<-20&&c1>10)sc+=6;

  const isCTO=pair.info?.socials?.some(s=>s.url?.includes('/community'))||(pair.info?.description||'').toLowerCase().includes('cto');
  if(isCTO)sc+=4;

  return Math.min(100,Math.max(0,Math.round(sc)));
}

// ═══════════════════════════════════════════
// RUGCHECK + HONEYPOT DETECTION
// ═══════════════════════════════════════════
async function checkRug(addr){
  if(rugCache[addr])return rugCache[addr];
  try{
    const r=await fetch(`https://api.rugcheck.xyz/v1/tokens/${addr}/report/summary`,{signal:AbortSignal.timeout(5000)});
    if(!r.ok)return null;
    const d=await r.json();rugCache[addr]=d;return d;
  }catch(e){return null;}
}
function parseRug(d){
  if(!d||!d.risks)return{status:'unknown',risks:[]};
  const risks=(d.risks||[]);
  const names=risks.map(r=>(r.name||r.description||'').toLowerCase());

  // HONEYPOT — instant reject
  if(names.some(x=>x.includes('honeypot')||x.includes('honey pot')))return{status:'danger',reason:'Honeypot'};

  // MINT AUTHORITY — can mint infinite tokens
  if(d.mintAuthority||names.some(x=>x.includes('mint')&&(x.includes('enabl')||x.includes('authority'))))return{status:'danger',reason:'Mint enabled'};

  // FREEZE AUTHORITY — can freeze your tokens
  if(d.freezeAuthority||names.some(x=>x.includes('freeze')&&(x.includes('enabl')||x.includes('authority'))))return{status:'danger',reason:'Freeze enabled'};

  // TRANSFER FEE — hidden tax
  if(names.some(x=>x.includes('transfer fee')||x.includes('tax')))return{status:'danger',reason:'Transfer fee'};

  // BLACKLIST — can block your wallet
  if(names.some(x=>x.includes('blacklist')||x.includes('blocklist')))return{status:'danger',reason:'Blacklist'};

  // RUG/SCAM flag
  if(names.some(x=>x.includes('rug')||x.includes('scam')))return{status:'danger',reason:'Rug/scam'};

  // Too many risks
  if(risks.length>3)return{status:'danger',reason:risks.length+' risks'};

  // Concentrated holders
  if(names.some(x=>x.includes('top 10')||x.includes('concentrated')||x.includes('single holder')))return{status:'warn',reason:'Concentrated'};

  // Clean
  if(risks.length===0)return{status:'good',reason:'Clean'};
  if(risks.length<=2)return{status:'warn',reason:risks.map(r=>r.name||'').join(', ')};
  return{status:'danger',reason:'Multiple risks'};
}

// Extra honeypot detection from on-chain data
function isHoneypot(pair){
  const b5=pair.txns?.m5?.buys||0, s5=pair.txns?.m5?.sells||0;
  const b1=pair.txns?.h1?.buys||0, s1=pair.txns?.h1?.sells||0;
  const b24=pair.txns?.h24?.buys||0, s24=pair.txns?.h24?.sells||0;

  // Zero sells with many buys = classic honeypot
  if(s5===0&&s1===0&&b5>5&&b1>10)return{hp:true,reason:'0 sells (honeypot)'};
  if(s24===0&&b24>20)return{hp:true,reason:'0 sells 24h'};

  // 100% buy ratio with volume = suspicious
  const t5=b5+s5,t1=b1+s1;
  if(t5>10&&s5===0)return{hp:true,reason:'100% buy 5m'};
  if(t1>30&&s1<=1)return{hp:true,reason:'~100% buy 1h'};

  // Very high buy ratio with decent volume = likely honeypot
  const br1=t1>0?(b1/t1)*100:50;
  if(br1>98&&t1>20)return{hp:true,reason:'98%+ buy ratio'};

  return{hp:false};
}

// ═══════════════════════════════════════════
// SCAN CYCLE
// ═══════════════════════════════════════════
async function scan(){
  if(!running)return;
  cycles++;
  const all=new Map();

  const setStatus=t=>{const e=document.getElementById('statusText');if(e)e.textContent=t;};

  // Source 1: Latest profiles
  try{setStatus('📡 New tokens...');
    const r=await fetch('https://api.dexscreener.com/token-profiles/latest/v1',{signal:AbortSignal.timeout(8000)});
    const d=await r.json();
    if(Array.isArray(d))d.slice(0,100).forEach(t=>{if(t.tokenAddress&&valid.includes(t.chainId))all.set(t.tokenAddress,{addr:t.tokenAddress,chain:t.chainId,src:'new',icon:t.icon});});
  }catch(e){}

  // Source 2: Boosted
  try{setStatus(`📡 ${all.size} — Boosted...`);
    const r=await fetch('https://api.dexscreener.com/token-boosts/top/v1',{signal:AbortSignal.timeout(8000)});
    const d=await r.json();
    if(Array.isArray(d))d.slice(0,80).forEach(t=>{if(t.tokenAddress&&valid.includes(t.chainId)&&!all.has(t.tokenAddress))all.set(t.tokenAddress,{addr:t.tokenAddress,chain:t.chainId,src:'boosted',icon:t.icon});});
  }catch(e){}

  // Source 2b: Latest boosts
  try{setStatus(`📡 ${all.size} — Latest boosts...`);
    const r=await fetch('https://api.dexscreener.com/token-boosts/latest/v1',{signal:AbortSignal.timeout(8000)});
    const d=await r.json();
    if(Array.isArray(d))d.slice(0,80).forEach(t=>{if(t.tokenAddress&&valid.includes(t.chainId)&&!all.has(t.tokenAddress))all.set(t.tokenAddress,{addr:t.tokenAddress,chain:t.chainId,src:'boosted',icon:t.icon});});
  }catch(e){}

  // Source 3: Gainers per chain
  try{for(const ch of['solana','base','ethereum','bsc','arbitrum']){
    const r=await fetch(`https://api.dexscreener.com/latest/dex/search?q=${ch}`,{signal:AbortSignal.timeout(5000)});
    const d=await r.json();
    if(d.pairs)d.pairs.filter(p=>p.chainId===ch&&parseFloat(p.priceChange?.h1)>5)
      .sort((a,b)=>(parseFloat(b.priceChange?.h1)||0)-(parseFloat(a.priceChange?.h1)||0))
      .slice(0,60).forEach(p=>{const a=p.baseToken?.address;if(a&&!all.has(a))all.set(a,{addr:a,chain:p.chainId,src:'gainer',pair:p,icon:p.info?.imageUrl});});
  }}catch(e){}

  // Source 4: MASSIVE keyword search (60 random from 150+)
  const kws=[
    // Meme culture
    'moon','pump','gem','degen','pepe','wojak','based','chad','giga','mega','ultra',
    'trump','elon','musk','biden','kanye','drake','snoop','tate',
    // Animals
    'cat','dog','frog','inu','shib','doge','bonk','wif','popcat','neiro',
    'panda','monkey','ape','lion','wolf','fox','bear','bull','whale','rat',
    'dragon','phoenix','bird','fish','pig','cow','duck','goat','snake','tiger',
    // Crypto
    'ai','gpt','agent','bot','meme','nft','web3','defi','dao','token',
    'sol','eth','btc','base','matic','avax','arb',
    // Vibes
    'rich','gold','diamond','rocket','lambo','million','billion','cash','money',
    'king','queen','god','jesus','devil','angel','titan',
    'alpha','sigma','beta','omega','safe','fair','new','hot','fire','burn',
    // Culture
    'cope','kek','wagmi','ngmi','gm','ser','fren','anon','rekt','noob',
    'wen','moon','mars','pluto','galaxy','space','star','sun',
    // Actions
    'buy','sell','hold','pump','dump','send','flip','stake',
    // Colors
    'red','blue','green','pink','black','white','purple',
    // Food
    'pizza','burger','taco','sushi','bread','cheese','banana','apple',
    // Random trending
    'baby','mini','micro','nano','pixel','punk','rare','epic','legend',
    'turbo','fast','speed','power','max','pro','elite','prime',
    'usa','america','china','japan','korea','india','europe','world',
    'game','play','win','bet','casino','poker','slot',
    'love','hate','happy','sad','angry','fear','hope','dream',
    // All letters
    'a','b','c','d','e','f','g','h','i','j','k','l','m',
    'n','o','p','q','r','s','t','u','v','w','x','y','z',
    // Numbers
    '1','2','3','4','5','10','69','100','420','777','999','1000','10000'
  ];
  const sh=[...kws].sort(()=>Math.random()-.5).slice(0,60);

  for(let i=0;i<sh.length;i++){
    setStatus(`🔍 ${all.size} tokens — "${sh[i]}"...`);
    try{const r=await fetch(`https://api.dexscreener.com/latest/dex/search?q=${sh[i]}`,{signal:AbortSignal.timeout(4000)});
      const d=await r.json();
      if(d.pairs)d.pairs.slice(0,70).forEach(p=>{const a=p.baseToken?.address;if(a&&valid.includes(p.chainId)&&!all.has(a))all.set(a,{addr:a,chain:p.chainId,src:'search',pair:p,icon:p.info?.imageUrl});});
    }catch(e){}
    if(i%10===9)await new Promise(r=>setTimeout(r,80));
  }

  // Score & honeypot pre-check
  setStatus(`⚙️ Scoring ${all.size}...`);
  const cands=Array.from(all.values());
  let scored=[];

  for(let i=0;i<cands.length;i++){
    if(i%60===0)setStatus(`⚙️ ${i}/${cands.length}...`);
    try{
      let pair=cands[i].pair;
      if(!pair){const r=await fetch(`https://api.dexscreener.com/latest/dex/tokens/${cands[i].addr}`,{signal:AbortSignal.timeout(3000)});const d=await r.json();if(d.pairs&&d.pairs[0])pair=d.pairs.sort((a,b)=>(parseFloat(b.liquidity?.usd)||0)-(parseFloat(a.liquidity?.usd)||0))[0];}
      if(!pair)continue;

      // Honeypot check BEFORE scoring
      const hp=isHoneypot(pair);
      if(hp.hp)continue;

      const s=scoreToken(pair,cands[i].src);
      if(s>=55)scored.push({pair,score:s,src:cands[i].src,icon:cands[i].icon||pair.info?.imageUrl||''});
    }catch(e){}
    if(i%25===24)await new Promise(r=>setTimeout(r,30));
  }

  totalScanned+=cands.length;
  totalPassed+=scored.length;

  // Rugcheck top 40 candidates
  scored.sort((a,b)=>b.score-a.score);
  const top=scored.slice(0,40);
  setStatus(`🔒 Rugcheck + Honeypot on ${top.length} tokens...`);
  const clean=[];

  for(const t of top){
    const addr=t.pair.baseToken?.address;if(!addr)continue;
    const sym=t.pair.baseToken?.symbol||'?';

    // Rugcheck API
    const rug=await checkRug(addr);
    const r=parseRug(rug);
    if(r.status==='danger'){
      log('🚫',`<span style="color:${C.rd}">${esc(sym)}</span> rejected: ${r.reason}`);
      continue;
    }
    clean.push({...t,rugStatus:r.status,rugReason:r.reason||''});
  }

  log('🔍',`Cycle ${cycles}: <span style="color:${C.cy}">${cands.length}</span> scanned, <span style="color:${C.gr}">${clean.length}</span> passed`);

  // Update top 10
  let changed=false;
  for(const c of clean){
    const addr=c.pair.baseToken?.address;
    const ei=gems.findIndex(g=>g.address===addr);

    if(ei>=0){
      if(c.score>gems[ei].score){gems[ei]=buildGem(c);changed=true;}
    }else if(gems.length<MAX){
      gems.push(buildGem(c));changed=true;
      log('💎',`<span style="color:${C.go}">NEW</span> $${esc(c.pair.baseToken?.symbol)}`);
    }else{
      const low=gems.reduce((m,g,i)=>g.score<m.s?{s:g.score,i}:m,{s:999,i:-1});
      if(c.score>low.s){
        const old=gems[low.i];
        gems[low.i]=buildGem(c);changed=true;
        log('🔄',`<span style="color:${C.go}">UPGRADE</span> $${esc(c.pair.baseToken?.symbol)} ← $${esc(old.symbol)}`);
      }
    }
  }

  if(changed){gems.sort((a,b)=>b.score-a.score);}
  render();
  setStatus(`✅ ${gems.length} gems live — Next in 45s`);
  if(running)setTimeout(scan,45000);
}

function buildGem(c){
  const p=c.pair;
  const mc=parseFloat(p.marketCap)||0,liq=parseFloat(p.liquidity?.usd)||0,vol=parseFloat(p.volume?.h24)||0;
  const age=p.pairCreatedAt?(Date.now()-p.pairCreatedAt)/3600000:999;
  const b=p.txns?.h24?.buys||0,s=p.txns?.h24?.sells||0;
  const isCTO=p.info?.socials?.some(x=>x.url?.includes('/community'))||(p.info?.description||'').toLowerCase().includes('cto');
  return{
    symbol:p.baseToken?.symbol||'???',name:(p.baseToken?.name||'').slice(0,30),
    chain:p.chainId||'unknown',address:p.baseToken?.address,pairAddress:p.pairAddress,
    price:parseFloat(p.priceUsd)||0,mc,liq,vol,
    chg1h:parseFloat(p.priceChange?.h1)||0,chg24h:parseFloat(p.priceChange?.h24)||0,
    buyRatio:b+s>0?Math.round(b/(b+s)*100):50,txns:b+s,age:Math.round(age),
    score:c.score,src:c.src,isCTO,logo:c.icon||p.info?.imageUrl||`https://dd.dexscreener.com/ds-data/tokens/${p.chainId}/${p.baseToken?.address}.png`||'',
    rugStatus:c.rugStatus||'unknown',rugReason:c.rugReason||'',
    twitter:p.info?.socials?.find(x=>x.type==='twitter')?.url||'',
    website:p.info?.websites?.[0]?.url||'',
    telegram:p.info?.socials?.find(x=>x.type==='telegram')?.url||''
  };
}
