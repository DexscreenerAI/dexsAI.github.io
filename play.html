<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>$BYEBOSS — WORLD (beta)</title>
<meta name="description" content="$BYEBOSS: WORLD — a 2.5D Three.js forest. Your sprite, in a real 3D world.">
<meta name="theme-color" content="#06040d">
<link rel="icon" type="image/png" href="https://i.ibb.co/pvKhr9Fh/5962780110555385014-Photoroom.png">
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{width:100%;height:100%;overflow:hidden;background:#06040d;
    font-family:'Trebuchet MS',Verdana,system-ui,sans-serif;color:#eafff2;user-select:none;touch-action:none}
  #game{position:fixed;inset:0}
  canvas{position:absolute;inset:0;width:100%;height:100%;display:block}

  .hud{position:absolute;inset:0;pointer-events:none;z-index:5}
  .hud > *{pointer-events:auto}
  .hint{position:absolute;top:14px;left:50%;transform:translateX(-50%);
    background:rgba(6,4,13,.72);border:1px solid rgba(57,255,139,.25);padding:9px 18px;border-radius:999px;
    font-size:13px;letter-spacing:.3px;color:#cdebd9;white-space:nowrap;backdrop-filter:blur(6px);box-shadow:0 6px 22px rgba(0,0,0,.45)}
  .hint b{color:#39ff8b;font-weight:700}
  .brand{position:absolute;top:12px;left:12px;display:flex;align-items:center;gap:10px}
  .brand a.back{display:inline-flex;align-items:center;gap:6px;text-decoration:none;background:rgba(6,4,13,.72);
    border:1px solid rgba(255,255,255,.14);color:#eafff2;padding:8px 12px;border-radius:10px;font-size:13px;font-weight:700;backdrop-filter:blur(6px)}
  .brand a.back:hover{border-color:rgba(57,255,139,.6);color:#39ff8b}
  .brand .title{font-weight:800;font-size:15px;letter-spacing:.4px;text-shadow:0 2px 10px rgba(0,0,0,.7)}
  .brand .title .b{color:#ff3b3b}.brand .title .g{color:#39ff8b}
  .brand .tag{font-size:10px;background:rgba(57,255,139,.16);color:#39ff8b;border:1px solid rgba(57,255,139,.4);
    padding:2px 7px;border-radius:999px;font-weight:700;letter-spacing:.5px}
  .score{position:absolute;top:12px;right:12px;display:flex;align-items:center;gap:8px;background:rgba(6,4,13,.72);
    border:1px solid rgba(255,196,0,.35);padding:8px 14px;border-radius:12px;font-weight:800;font-size:15px;backdrop-filter:blur(6px)}
  .score .coin{width:18px;height:18px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#ffe680,#ffb300 55%,#b87900);
    box-shadow:0 0 8px rgba(255,196,0,.6);display:grid;place-items:center;color:#5a3b00;font-size:11px;font-weight:900}
  .score b{color:#ffd54a}
  .abilities{position:absolute;left:50%;bottom:16px;transform:translateX(-50%);display:flex;gap:12px;z-index:6}
  .ab{position:relative;width:84px;height:88px;border-radius:14px;cursor:pointer;
    background:linear-gradient(180deg,rgba(20,14,34,.78),rgba(10,7,20,.82));border:1px solid rgba(255,255,255,.12);
    backdrop-filter:blur(6px);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;
    transition:transform .08s,border-color .12s,box-shadow .12s}
  .ab:hover{border-color:rgba(57,255,139,.55)}
  .ab:active,.ab.pressed{transform:translateY(2px) scale(.97);border-color:#39ff8b;box-shadow:0 0 0 2px rgba(57,255,139,.35) inset,0 0 18px rgba(57,255,139,.35)}
  .ab .num{position:absolute;top:-9px;left:-9px;width:24px;height:24px;border-radius:8px;background:#0c0a17;
    border:1px solid rgba(255,255,255,.22);display:grid;place-items:center;font-size:12px;font-weight:800;color:#eafff2}
  .ab .ico{font-size:23px;line-height:1;color:#ffb300;filter:drop-shadow(0 0 6px rgba(255,179,0,.5))}
  .ab .lbl{font-size:13px;font-weight:700;letter-spacing:.3px;color:#e7fff3}
  .touch{display:none}
  body.touch .touch{display:block}
  .dpad{position:absolute;left:18px;bottom:118px;width:150px;height:150px;z-index:6}
  .dpad button{position:absolute;width:50px;height:50px;border-radius:12px;background:rgba(20,14,34,.8);
    border:1px solid rgba(255,255,255,.14);color:#cdebd9;font-size:18px;display:grid;place-items:center}
  .dpad button:active{background:rgba(57,255,139,.25);border-color:#39ff8b;color:#fff}
  .dpad .up{left:50px;top:0}.dpad .down{left:50px;top:100px}.dpad .left{left:0;top:50px}.dpad .right{left:100px;top:50px}
  .rbtns{position:absolute;right:18px;bottom:118px;display:flex;flex-direction:column;gap:12px;z-index:6}
  .rbtns button{width:78px;height:54px;border-radius:14px;border:1px solid rgba(255,255,255,.14);background:rgba(20,14,34,.8);
    color:#eafff2;font-weight:800;font-size:13px;letter-spacing:.4px}
  .rbtns button:active{background:rgba(57,255,139,.25);border-color:#39ff8b}
  #load{position:absolute;inset:0;z-index:20;background:#06040d;display:grid;place-items:center;transition:opacity .4s}
  #load.hide{opacity:0;pointer-events:none}
  #load .box{text-align:center}
  #load .logo{font-size:34px;font-weight:900;letter-spacing:1px;margin-bottom:6px}
  #load .logo .b{color:#ff3b3b}#load .logo .g{color:#39ff8b}
  #load .sub{color:#9fb6a8;font-size:13px;margin-bottom:22px;letter-spacing:.5px}
  #load .bar{width:240px;height:8px;border-radius:999px;background:rgba(255,255,255,.08);overflow:hidden;margin:0 auto}
  #load .bar i{display:block;height:100%;width:0;border-radius:999px;background:linear-gradient(90deg,#39ff8b,#7c4dff);transition:width .2s}
  #load .pct{margin-top:10px;font-size:12px;color:#6f8a7c}
  @media (max-width:560px){ .hint{font-size:11px;padding:7px 12px} .ab{width:66px;height:76px}.ab .ico{font-size:19px}.ab .lbl{font-size:11px} .brand .title{font-size:13px} }

  /* Shop */
  .shopbtn{position:absolute;left:12px;top:56px;z-index:7;display:flex;align-items:center;gap:7px;
    background:rgba(6,4,13,.74);border:1px solid rgba(124,77,255,.55);color:#eafff2;padding:9px 14px;
    border-radius:11px;font-weight:800;font-size:16px;cursor:pointer;backdrop-filter:blur(6px)}
  .shopbtn span{font-size:13px}
  .shopbtn:hover{border-color:#7c4dff;color:#b69bff}
  .shop{position:absolute;inset:0;z-index:30;display:grid;place-items:center;background:rgba(4,3,10,.62);backdrop-filter:blur(3px)}
  .shop.hidden{display:none}
  .shop-box{width:min(92vw,520px);background:#0c0a17;border:1px solid rgba(124,77,255,.5);border-radius:16px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.6)}
  .shop-head{display:flex;justify-content:space-between;align-items:center;padding:14px 18px;font-weight:800;letter-spacing:.5px;color:#fff;
    background:linear-gradient(90deg,rgba(124,77,255,.28),rgba(57,255,139,.12))}
  .shop-x{cursor:pointer;opacity:.8}.shop-x:hover{opacity:1;color:#ff6b6b}
  .shop-list{display:flex;flex-wrap:wrap;gap:12px;padding:18px;justify-content:center}
  .shopcard{width:128px;height:128px;border-radius:14px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;
    background:linear-gradient(180deg,rgba(28,20,46,.92),rgba(14,10,24,.92));border:2px solid rgba(255,255,255,.12);color:#eafff2;transition:transform .1s,border-color .12s,box-shadow .12s}
  .shopcard:hover{transform:translateY(-2px);border-color:rgba(124,77,255,.75)}
  .shopcard.active{border-color:#39ff8b;box-shadow:0 0 0 2px rgba(57,255,139,.3) inset}
  .sc-ic{font-size:40px;line-height:1}.sc-nm{font-weight:800;font-size:14px}
  .shop-foot{padding:0 18px 16px;text-align:center;color:#6f8a7c;font-size:12px}

  /* Minimap */
  .minimap{position:absolute;right:16px;bottom:16px;width:206px;height:206px;z-index:6;border-radius:50%;
    background:rgba(6,18,10,.4);box-shadow:0 8px 26px rgba(0,0,0,.55)}
  @media (max-width:560px){ .minimap{width:140px;height:140px;bottom:150px} }

  /* Crosshair */
  .crosshair{position:absolute;left:50%;top:50%;width:24px;height:24px;transform:translate(-50%,-50%);z-index:6;pointer-events:none}
  .crosshair::before,.crosshair::after{content:'';position:absolute;background:rgba(57,255,139,.9);box-shadow:0 0 4px rgba(0,0,0,.7)}
  .crosshair::before{left:50%;top:0;width:2px;height:100%;transform:translateX(-50%)}
  .crosshair::after{top:50%;left:0;height:2px;width:100%;transform:translateY(-50%)}
</style>
</head>
<body>
<div id="game">
  <canvas id="cv"></canvas>
  <div class="hud">
    <div class="brand">
      <a class="back" href="./game.html" title="Back">‹ Back</a>
      <span class="title"><span class="b">$BYE</span><span class="g">BOSS</span> · WORLD</span>
      <span class="tag">BETA · 3D</span>
    </div>
    <div class="hint"><b>WASD</b> bouge · <b>SOURIS</b> vise · <b>CLIC&nbsp;DROIT</b> tire · <b>SHIFT</b> run · <b>1–4</b> attaque</div>
    <canvas id="minimap" width="300" height="300" class="minimap"></canvas>
    <div id="crosshair" class="crosshair"></div>
    <div class="score"><span class="coin">$</span>$BYEBOSS&nbsp;<b id="scoreVal">0</b></div>

    <button id="shopBtn" class="shopbtn" title="Changer de personnage">🛍️<span>Shop</span></button>
    <div id="shop" class="shop hidden">
      <div class="shop-box">
        <div class="shop-head"><span>🛍️ CHOISIS TON PERSO</span><span id="shopClose" class="shop-x">✕</span></div>
        <div id="shopList" class="shop-list"></div>
        <div class="shop-foot">Plus de skins bientôt — envoie-moi des .glb 🤘</div>
      </div>
    </div>
    <div class="touch">
      <div class="dpad">
        <button class="up"    data-dir="f">▲</button>
        <button class="down"  data-dir="b">▼</button>
        <button class="left"  data-dir="l">◀</button>
        <button class="right" data-dir="r">▶</button>
      </div>
      <div class="rbtns"><button data-btn="run">RUN</button><button data-btn="jump">JUMP</button><button id="fireBtn">🔫 FIRE</button></div>
    </div>
    <div class="abilities">
      <div class="ab" data-act="punch"><span class="num">1</span><span class="ico">★</span><span class="lbl">Punch</span></div>
      <div class="ab" data-act="kick"><span class="num">2</span><span class="ico">★</span><span class="lbl">Kick</span></div>
      <div class="ab" data-act="pickup"><span class="num">3</span><span class="ico">★</span><span class="lbl">Pickup</span></div>
      <div class="ab" data-act="attack"><span class="num">4</span><span class="ico">★</span><span class="lbl">Attack</span></div>
    </div>
  </div>
  <div id="load"><div class="box">
    <div class="logo"><span class="b">$BYE</span><span class="g">BOSS</span></div>
    <div class="sub">WORLD · loading the forest…</div>
    <div class="bar"><i id="loadBar"></i></div>
    <div class="pct" id="loadPct">0%</div>
  </div></div>
</div>

<script type="importmap">
{ "imports": { "three": "./assets/vendor/three.module.js" } }
</script>
<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from './assets/vendor/GLTFLoader.js';

// ---------------------------------------------------------------------------
// Renderer / scene / camera
// ---------------------------------------------------------------------------
const canvas = document.getElementById('cv');
const renderer = new THREE.WebGLRenderer({ canvas, antialias:true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
renderer.outputColorSpace = THREE.SRGBColorSpace;

const scene = new THREE.Scene();
const FOG = new THREE.Color('#bfe0cf');         // soft daylight haze (forest)
scene.background = FOG.clone();
scene.fog = new THREE.Fog(FOG.clone(), 24, 95);

const camera = new THREE.PerspectiveCamera(55, 1, 0.1, 400);
function resize(){
  const w = window.innerWidth, h = window.innerHeight;
  renderer.setSize(w, h); camera.aspect = w/h; camera.updateProjectionMatrix();
}
window.addEventListener('resize', resize); resize();

// lights
scene.add(new THREE.HemisphereLight('#eaf6d8', '#33502a', 1.05));
const sun = new THREE.DirectionalLight('#fff6df', 1.15);
sun.position.set(14, 24, 10); scene.add(sun);

// ---------------------------------------------------------------------------
// Asset loading
// ---------------------------------------------------------------------------
const texLoader = new THREE.TextureLoader();
let loaded = 0, total = 0, started = false;
const loadBar = document.getElementById('loadBar'), loadPct = document.getElementById('loadPct');
function asset(){ loaded++; const p = Math.round(loaded/total*100); loadBar.style.width = p+'%'; loadPct.textContent = p+'%';
  if (loaded >= total) start(); }
function tex(url, srgb, repeat){
  total++;
  const t = texLoader.load(url, asset, undefined, asset);
  if (srgb) t.colorSpace = THREE.SRGBColorSpace;
  if (repeat){ t.wrapS = t.wrapT = THREE.RepeatWrapping; t.repeat.set(repeat[0], repeat[1]); }
  return t;
}

// ground (tiled grass) + a dirt trail
const grassTex = tex('./assets/game/ground-grass.jpg', true, [60,60]);
const ground = new THREE.Mesh(new THREE.PlaneGeometry(260,260), new THREE.MeshLambertMaterial({ map:grassTex }));
ground.rotation.x = -Math.PI/2; scene.add(ground);
const dirtTex = tex('./assets/game/ground-brick.jpg', true, [3,90]);
const trail = new THREE.Mesh(new THREE.PlaneGeometry(5.5,260), new THREE.MeshLambertMaterial({ map:dirtTex }));
trail.rotation.x = -Math.PI/2; trail.position.y = 0.02; scene.add(trail);

// (the character is the rigged ByeBoss GLB — loaded further down)

// ---------------------------------------------------------------------------
// World props — GLB trees, lamp posts, bushes
// ---------------------------------------------------------------------------
// Trees: clones of a low-poly GLB, scattered around (skip the trail + spawn).
const treeGroup = new THREE.Group(); scene.add(treeGroup);
let treeTemplate = null, treeMinY = 0;
const TREE = { count:143, scaleMin:1.95, scaleMax:1.95, area:150, yOffset:-1.45 };   // tuned
function makeRng(seed){ let s = seed>>>0; return () => { s = (Math.imul(s,1103515245)+12345)>>>0; return s/4294967296; }; }
function scatterTrees(){
  treeGroup.clear();
  if (!treeTemplate) return;
  const rng = makeRng(20240607);                          // fixed seed -> stable layout while tuning
  let placed = 0, guard = 0;
  while (placed < TREE.count && guard < TREE.count*10 + 80){
    guard++;
    const x = (rng()-0.5)*2*TREE.area, z = (rng()-0.5)*2*TREE.area;
    const s = TREE.scaleMin + rng()*Math.max(0, TREE.scaleMax - TREE.scaleMin);
    const ry = rng()*6.28;
    if (Math.abs(x) < 3.6 && Math.abs(z) < 70) continue;   // keep the trail clear
    if (Math.abs(x) < 6 && Math.abs(z) < 6) continue;       // keep spawn clear
    const t = treeTemplate.clone(true);
    t.scale.setScalar(s);
    t.userData.baseY = -treeMinY * s;
    t.position.set(x, t.userData.baseY + TREE.yOffset, z);
    t.rotation.y = ry;
    treeGroup.add(t); placed++;
  }
}
total++;
new GLTFLoader().load('./assets/game/tree.glb', (gltf) => {
  treeTemplate = gltf.scene;
  treeMinY = new THREE.Box3().setFromObject(treeTemplate).min.y;   // base offset so trunks sit on the ground
  scatterTrees();
  asset();
}, undefined, (err) => { console.error('tree GLB failed to load', err); asset(); });

// ---- abandoned buildings (decor) — loaded after start, popped in when ready ----
const BUILDINGS = ['./assets/game/building1.glb', './assets/game/building2.glb', './assets/game/building3.glb'];
const buildingGroup = new THREE.Group(); scene.add(buildingGroup);
const buildTemplates = [];
const BUILD = { count:6, scale:1.0, area:140, yOffset:0 };   // tuned via the panel
const B_TARGET = 16, B_PATTERN = [2,0,1,0,1,0,1];            // template per slot (building3 sparse — it's the heavy one)
function scatterBuildings(){
  buildingGroup.clear();
  if (!buildTemplates.some(Boolean)) return;
  const rng = makeRng(91135);
  let placed = 0, guard = 0;
  while (placed < BUILD.count && guard < BUILD.count*14 + 80){
    guard++;
    const x = (rng()-0.5)*2*BUILD.area, z = (rng()-0.5)*2*BUILD.area;
    const rot = rng()*6.28;
    const tpl = buildTemplates[B_PATTERN[placed % B_PATTERN.length]];
    if (Math.abs(x) < 9 && Math.abs(z) < 82) continue;   // keep the trail clear
    if (Math.abs(x) < 13 && Math.abs(z) < 13) continue;   // keep spawn clear
    if (!tpl) continue;
    const s = tpl.unitScale * BUILD.scale;
    const m = tpl.scene.clone(true);
    m.scale.setScalar(s);
    m.userData.baseY = -tpl.minY * s;
    m.position.set(x, m.userData.baseY + BUILD.yOffset, z);
    m.rotation.y = rot;
    buildingGroup.add(m); placed++;
  }
}
let bLoaded = 0;
BUILDINGS.forEach((url, i) => {
  const done = () => { if (++bLoaded === BUILDINGS.length){ scatterBuildings(); } };
  new GLTFLoader().load(url, (gltf) => {
    const sc = gltf.scene; sc.traverse(o => { o.frustumCulled = false; });
    const box = new THREE.Box3().setFromObject(sc), size = box.getSize(new THREE.Vector3());
    buildTemplates[i] = { scene:sc, unitScale: B_TARGET / Math.max(size.x, size.y, size.z, 0.001), minY: box.min.y };
    done();
  }, undefined, (err) => { console.error('building failed:', url, err); done(); });
});
// TEMP building-tuning panel — drag, Copier, send me the values, then I bake + delete it.
function buildBuildingPanel(){
  if (document.getElementById('blddbg')) return;
  const store = {};
  const p = document.createElement('div'); p.id = 'blddbg';
  p.style.cssText = 'position:fixed;top:64px;right:14px;width:248px;z-index:50;background:rgba(10,8,18,.93);border:1px solid rgba(255,150,60,.55);border-radius:12px;color:#eafff2;font:12px Trebuchet MS,Verdana,sans-serif;box-shadow:0 12px 32px rgba(0,0,0,.55);backdrop-filter:blur(6px);user-select:none';
  const head = document.createElement('div');
  head.style.cssText = 'cursor:move;padding:8px 10px;background:rgba(255,150,60,.22);border-radius:12px 12px 0 0;font-weight:800;display:flex;justify-content:space-between;align-items:center';
  head.innerHTML = '<span>🏚️ BÂTIMENTS — glisse-moi</span><span id="bldX" style="cursor:pointer;opacity:.75">✕</span>';
  const body = document.createElement('div');
  body.style.cssText = 'padding:10px 12px;display:flex;flex-direction:column;gap:9px;max-height:62vh;overflow:auto';
  p.append(head, body);
  function row(label, min, max, step, val, fn){
    store[label] = +val;
    const wrap = document.createElement('div');
    const h = document.createElement('div'); h.style.cssText = 'display:flex;justify-content:space-between;margin-bottom:2px';
    const nm = document.createElement('span'); nm.textContent = label;
    const out = document.createElement('span'); out.style.color = '#ffb066'; out.textContent = (+val).toFixed(2);
    h.append(nm, out);
    const inp = document.createElement('input'); inp.type = 'range'; inp.min = min; inp.max = max; inp.step = step; inp.value = val; inp.style.width = '100%';
    inp.addEventListener('input', () => { const v = parseFloat(inp.value); out.textContent = v.toFixed(2); store[label] = v; fn(v); });
    wrap.append(h, inp); body.append(wrap);
  }
  row('count',   0, 20, 1,    BUILD.count,   v => { BUILD.count = Math.round(v); scatterBuildings(); });
  row('scale',   0.2, 4, 0.05, BUILD.scale,  v => { BUILD.scale = v; scatterBuildings(); });
  row('area',    40, 320, 5,  BUILD.area,    v => { BUILD.area = v; scatterBuildings(); });
  row('yOffset', -6, 6, 0.1,  BUILD.yOffset, v => { BUILD.yOffset = v; buildingGroup.children.forEach(m => m.position.y = (m.userData.baseY || 0) + v); });
  const btn = document.createElement('button');
  btn.textContent = '📋 Copier les valeurs';
  btn.style.cssText = 'margin-top:4px;padding:9px;border-radius:8px;border:1px solid #ff963c;background:rgba(255,150,60,.22);color:#eafff2;font-weight:800;cursor:pointer';
  btn.onclick = () => {
    const txt = 'BUILD ' + Object.entries(store).map(([k,v]) => `${k}=${(+v).toFixed(3)}`).join(' | ');
    const ok = () => { btn.textContent = '✅ Copié — colle-le-moi'; setTimeout(() => btn.textContent = '📋 Copier les valeurs', 1500); };
    if (navigator.clipboard) navigator.clipboard.writeText(txt).then(ok).catch(() => prompt('Copie ça :', txt));
    else prompt('Copie ça :', txt);
  };
  body.append(btn);
  p.addEventListener('keydown', e => e.stopPropagation());
  let dragging = false, ox = 0, oy = 0;
  head.addEventListener('pointerdown', e => { if (e.target.id === 'bldX') return; dragging = true; ox = e.clientX - p.offsetLeft; oy = e.clientY - p.offsetTop; e.preventDefault(); });
  window.addEventListener('pointermove', e => { if (!dragging) return; p.style.left = Math.max(0, e.clientX - ox) + 'px'; p.style.top = Math.max(0, e.clientY - oy) + 'px'; p.style.right = 'auto'; });
  window.addEventListener('pointerup', () => dragging = false);
  head.querySelector('#bldX').onclick = () => p.remove();
  document.body.appendChild(p);
}
// bushes (ground detail)
const bushGeo = new THREE.IcosahedronGeometry(0.5, 0);
const bushMat = new THREE.MeshLambertMaterial({ color:'#2c6e34', flatShading:true });
for (let i=0;i<70;i++){
  const x = (Math.random()-0.5)*220, z = (Math.random()-0.5)*220;
  if (Math.abs(x) < 3 && Math.abs(z) < 70) continue;
  const b = new THREE.Mesh(bushGeo, bushMat);
  b.position.set(x, 0.18, z); b.scale.set(0.5+Math.random()*0.7, 0.4+Math.random()*0.4, 0.5+Math.random()*0.7);
  scene.add(b);
}
// lamp posts (a few cast real light)

const poleMat = new THREE.MeshLambertMaterial({ color:'#23262b' });

function playClip(name, once){
  const a = actions[name]; if (!a) return;
  if (a === curAction && a.isRunning() && !once) return;
  if (curAction && curAction !== a) curAction.fadeOut(0.18);

}

const ISO_STATES = { idle:{fps:7,loop:true}, walk:{fps:12,loop:true}, run:{fps:16,loop:true}, jump:{fps:16,loop:false}, shot:{fps:22,loop:true} };
const ISO_DIRS = ['up','down','right'];
const ISO = { y:0.96, scale:2.7 };   // tuned
const isoTex = {}; let isoLoaded = false, isoSprite = null, spriteActive = false, sprState = 'idle', sprT = 0;
function loadIso(onDone){
  if (isoLoaded){ onDone && onDone(); return; }
  const total2 = ISO_DIRS.length * Object.keys(ISO_STATES).length; let n = 0;
  const tick = () => { if (++n >= total2){ isoLoaded = true; onDone && onDone(); } };
  for (const s in ISO_STATES) for (const d of ISO_DIRS){
    const t = new THREE.TextureLoader().load('./assets/game/iso/'+s+'_'+d+'.png', tick, undefined, tick);
    t.colorSpace = THREE.SRGBColorSpace; t.magFilter = THREE.LinearFilter; t.minFilter = THREE.LinearFilter;
    t.generateMipmaps = false; t.wrapS = t.wrapT = THREE.RepeatWrapping; t.repeat.set(1/5, 1/5);
    isoTex[s+'_'+d] = t;
  }
  isoSprite = new THREE.Mesh(new THREE.PlaneGeometry(1, 1),
    new THREE.MeshBasicMaterial({ transparent:true, alphaTest:0.3, side:THREE.DoubleSide }));
  isoSprite.visible = false; scene.add(isoSprite);
}
function applyIsoChar(onDone){
  loadIso(() => {
    if (activeModel){ player.remove(activeModel); activeModel = null; }   // hide the GLB
    if (gunModel) gunModel.visible = false;                                // iso sprites already hold a gun
    mixer = null; spriteActive = true; isoSprite.visible = true; sprState = 'idle'; sprT = 0;
    onDone && onDone();
  });
}
function isoDir(){   // character facing -> screen direction (relative to the camera)
  const fx = Math.sin(faceAngle), fz = Math.cos(faceAngle);
  const fdot = fx*(-Math.sin(camYaw)) + fz*(-Math.cos(camYaw));   // along camera forward
  const rdot = fx*( Math.cos(camYaw)) + fz*(-Math.sin(camYaw));   // along camera right
  if (Math.abs(fdot) >= Math.abs(rdot)) return fdot > 0 ? 'up' : 'down';
  return rdot > 0 ? 'right' : 'left';
}
function updateSpriteChar(dt, moving){
  let st;
  if (aiming || locked) st = 'shot';
  else if (!grounded) st = 'jump';
  else if (moving) st = (keys.run ? 'run' : 'walk');
  else st = 'idle';
  if (st !== sprState){ sprState = st; sprT = 0; } else sprT += dt;
  const dir = isoDir(), flip = dir === 'left', cfg = ISO_STATES[st];
  let f = Math.floor(sprT*cfg.fps); f = cfg.loop ? f % 25 : Math.min(f, 24);
  const tex = isoTex[st + '_' + (flip ? 'right' : dir)];
  if (tex){ const col = f % 5, row = (f/5)|0; tex.offset.set(col/5, 1 - (row+1)/5); isoSprite.material.map = tex; isoSprite.material.needsUpdate = true; }
  isoSprite.scale.set(flip ? -ISO.scale : ISO.scale, ISO.scale, 1);
  isoSprite.position.set(pos.x, pos.y + ISO.y, pos.z);
  isoSprite.rotation.set(0, Math.atan2(camera.position.x - pos.x, camera.position.z - pos.z), 0);
}

let locked = false, lockTimer = 0, grounded = true, vy = 0, faceAngle = Math.PI;
let WALK = 7.0, RUN = 13.0, JUMP_V = 8.0; const GRAV = 22;

function doAction(name){

function angleLerp(a, b, t){ let d = ((b - a + Math.PI) % (2*Math.PI)) - Math.PI; if (d < -Math.PI) d += 2*Math.PI; return a + d*t; }

// ===== monsters — kill one for +1 $BYEBOSS =====
const monsterGroup = new THREE.Group(); scene.add(monsterGroup);
let monsterTemplate = null, monsterMinY = 0, monsterScale = 1;
const monsters = [];
const MON_COUNT = 8, MON_SPEED = 2.6, MON_DETECT = 28, MON_HP = 2, MON_HIT_RANGE = 4.4;
function spawnMonsterAt(m){
  const a = Math.random()*6.28, r = 24 + Math.random()*80;
  m.pos.set(Math.cos(a)*r, 0, Math.sin(a)*r);
  m.hp = MON_HP; m.state = 'alive'; m.t = Math.random()*2; m.wander = Math.random()*6.28;
  m.model.visible = true; m.model.scale.setScalar(monsterScale); m.model.rotation.set(0, m.wander, 0);
  m.model.position.set(m.pos.x, -monsterMinY*monsterScale, m.pos.z);
}
function makeMonsters(){
  for (let i = 0; i < MON_COUNT; i++){
    const model = monsterTemplate.clone(true); monsterGroup.add(model);
    const m = { model, pos:new THREE.Vector3(), hp:MON_HP, state:'alive', t:0, wander:0 };
    spawnMonsterAt(m); monsters.push(m);
  }
}
function updateMonsters(dt){
  for (const m of monsters){
    if (m.state === 'dead') continue;
    if (m.state === 'dying'){
      m.t += dt; const k = Math.min(1, m.t/0.8);
      m.model.scale.setScalar(monsterScale*(1-k));
      m.model.rotation.x = k*1.4;
      m.model.position.y = (-monsterMinY*monsterScale)*(1-k) - k*0.4;
      if (m.t > 0.85){ m.state = 'dead'; m.model.visible = false; m.model.rotation.x = 0; setTimeout(()=>spawnMonsterAt(m), 4000 + Math.random()*5000); }
      continue;
    }
    const dx = pos.x - m.pos.x, dz = pos.z - m.pos.z, d = Math.hypot(dx, dz);
    let dirx, dirz;
    if (d < MON_DETECT && d > 1.4){ dirx = dx/d; dirz = dz/d; }
    else { m.t += dt; if (m.t > 2.5){ m.t = 0; m.wander = Math.random()*6.28; } dirx = Math.sin(m.wander); dirz = Math.cos(m.wander); }
    m.pos.x = Math.max(-BOUND, Math.min(BOUND, m.pos.x + dirx*MON_SPEED*dt));
    m.pos.z = Math.max(-BOUND, Math.min(BOUND, m.pos.z + dirz*MON_SPEED*dt));
    m.model.position.set(m.pos.x, -monsterMinY*monsterScale, m.pos.z);
    m.model.rotation.y = angleLerp(m.model.rotation.y, Math.atan2(dirx, dirz), 1 - Math.pow(0.0015, dt));
  }
}
function hitMonsters(){
  const fx = Math.sin(faceAngle + faceOffset), fz = Math.cos(faceAngle + faceOffset);
  for (const m of monsters){
    if (m.state !== 'alive') continue;
    const dx = m.pos.x - pos.x, dz = m.pos.z - pos.z, d = Math.hypot(dx, dz);
    if (d > MON_HIT_RANGE) continue;
    if (d > 0.2 && (dx/d*fx + dz/d*fz) < 0.1) continue;   // must be roughly in front of the player
    if (--m.hp <= 0){ m.state = 'dying'; m.t = 0; score++; scoreVal.textContent = score; }
  }
}

function ownerMonster(obj){ for (const m of monsters){ let o = obj; while (o){ if (o === m.model) return m; o = o.parent; } } return null; }
function fireGun(){
  if (muzzle){ muzzle.visible = true; muzzle.scale.setScalar(0.7 + Math.random()*0.7); muzzle.rotation.z = Math.random()*6.28; muzzleTimer = 0.05; }
  raycaster.setFromCamera(screenCenter, camera);
  const hits = raycaster.intersectObjects(monsterGroup.children, true);
  if (hits.length){
    const m = ownerMonster(hits[0].object);
    if (m && m.state === 'alive' && --m.hp <= 0){ m.state = 'dying'; m.t = 0; score++; scoreVal.textContent = score; }
  }
  // aim at where the crosshair points so bullets converge there (not parallel + low)
  const aimPoint = hits.length ? hits[0].point : raycaster.ray.at(140, _v1);
  if (gunModel && gunModel.visible) gunTip.getWorldPosition(_v0);   // from the muzzle
  else _v0.set(pos.x, pos.y + 1.3, pos.z);                          // ...or the chest (gun hidden / iso)
  spawnBullet(_v0, _v2.copy(aimPoint).sub(_v0).normalize());
}
canvas.addEventListener('contextmenu', e => e.preventDefault());
canvas.addEventListener('mousedown', e => { if (e.button === 2) aiming = true; });
window.addEventListener('mouseup', e => { if (e.button === 2) aiming = false; });
const fireBtn = document.getElementById('fireBtn');
if (fireBtn){
  fireBtn.addEventListener('pointerdown', e => { e.preventDefault(); aiming = true; });
  fireBtn.addEventListener('pointerup', e => { e.preventDefault(); aiming = false; });
  fireBtn.addEventListener('pointerleave', () => { aiming = false; });
}
// TEMP gun-placement panel — drag, place it in the hand, Copier, send me the values, then I bake + delete.
function buildGunPanel(){
  if (document.getElementById('gundbg')) return;
  const store = {};
  const p = document.createElement('div'); p.id = 'gundbg';
  p.style.cssText = 'position:fixed;top:120px;left:14px;width:228px;z-index:50;background:rgba(10,8,18,.93);border:1px solid rgba(90,170,255,.55);border-radius:12px;color:#eafff2;font:12px Trebuchet MS,Verdana,sans-serif;box-shadow:0 12px 32px rgba(0,0,0,.55);backdrop-filter:blur(6px);user-select:none';
  const head = document.createElement('div');
  head.style.cssText = 'cursor:move;padding:8px 10px;background:rgba(90,170,255,.22);border-radius:12px 12px 0 0;font-weight:800;display:flex;justify-content:space-between;align-items:center';
  head.innerHTML = '<span>🔫 ARME — glisse-moi</span><span id="gunX" style="cursor:pointer;opacity:.75">✕</span>';
  const body = document.createElement('div'); body.style.cssText = 'padding:10px 12px;display:flex;flex-direction:column;gap:8px;max-height:64vh;overflow:auto';
  p.append(head, body);
  function row(label, min, max, step, val, fn){
    store[label] = +val;
    const w = document.createElement('div');
    const h = document.createElement('div'); h.style.cssText = 'display:flex;justify-content:space-between;margin-bottom:2px';
    const nm = document.createElement('span'); nm.textContent = label;
    const out = document.createElement('span'); out.style.color = '#7cb8ff'; out.textContent = (+val).toFixed(2);
    h.append(nm, out);
    const inp = document.createElement('input'); inp.type = 'range'; inp.min = min; inp.max = max; inp.step = step; inp.value = val; inp.style.width = '100%';
    inp.addEventListener('input', () => { const v = parseFloat(inp.value); out.textContent = v.toFixed(2); store[label] = v; fn(v); });
    w.append(h, inp); body.append(w);
  }
  row('px', -2, 2, 0.01, GUN.px, v => { GUN.px = v; applyGunTransform(); });
  row('py', 0, 3, 0.01, GUN.py, v => { GUN.py = v; applyGunTransform(); });
  row('pz', -2, 2, 0.01, GUN.pz, v => { GUN.pz = v; applyGunTransform(); });
  row('rotX', -3.2, 3.2, 0.05, GUN.rx, v => { GUN.rx = v; applyGunTransform(); });
  row('rotY', -3.2, 3.2, 0.05, GUN.ry, v => { GUN.ry = v; applyGunTransform(); });
  row('rotZ', -3.2, 3.2, 0.05, GUN.rz, v => { GUN.rz = v; applyGunTransform(); });
  row('scale', 0.2, 4, 0.05, GUN.scale, v => { GUN.scale = v; applyGunTransform(); });
  row('tip', -1, 2, 0.05, GUN.tip, v => { GUN.tip = v; applyGunTransform(); });
  const btn = document.createElement('button'); btn.textContent = '📋 Copier les valeurs';
  btn.style.cssText = 'margin-top:4px;padding:9px;border-radius:8px;border:1px solid #5aaaff;background:rgba(90,170,255,.22);color:#eafff2;font-weight:800;cursor:pointer';
  btn.onclick = () => {
    const txt = 'GUN ' + Object.entries(store).map(([k,v]) => `${k}=${(+v).toFixed(3)}`).join(' | ');
    const ok = () => { btn.textContent = '✅ Copié — colle-le-moi'; setTimeout(() => btn.textContent = '📋 Copier les valeurs', 1500); };
    if (navigator.clipboard) navigator.clipboard.writeText(txt).then(ok).catch(() => prompt('Copie ça :', txt)); else prompt('Copie ça :', txt);
  };
  body.append(btn);
  p.addEventListener('keydown', e => e.stopPropagation());
  let dr = false, ox = 0, oy = 0;
  head.addEventListener('pointerdown', e => { if (e.target.id === 'gunX') return; dr = true; ox = e.clientX - p.offsetLeft; oy = e.clientY - p.offsetTop; e.preventDefault(); });
  window.addEventListener('pointermove', e => { if (!dr) return; p.style.left = Math.max(0, e.clientX - ox) + 'px'; p.style.top = Math.max(0, e.clientY - oy) + 'px'; });
  window.addEventListener('pointerup', () => dr = false);
  head.querySelector('#gunX').onclick = () => p.remove();
  document.body.appendChild(p);
}

// ===== mouse / touch look (shooter-style) =====
const LOOK_SENS = 0.0026, PITCH_MIN = -0.5, PITCH_MAX = 1.0;
canvas.addEventListener('click', () => {
  const shopOpen = !document.getElementById('shop').classList.contains('hidden');
  if (!shopOpen && document.pointerLockElement !== canvas){ try { canvas.requestPointerLock(); } catch(e){} }
});
document.addEventListener('mousemove', (e) => {
  if (document.pointerLockElement !== canvas) return;
  camYaw -= e.movementX*LOOK_SENS;
  camPitch = Math.max(PITCH_MIN, Math.min(PITCH_MAX, camPitch - e.movementY*LOOK_SENS));
});
let lookId = null, lastTX = 0, lastTY = 0;
canvas.addEventListener('touchstart', (e) => { for (const t of e.changedTouches){ if (lookId === null && t.clientX > window.innerWidth*0.42){ lookId = t.identifier; lastTX = t.clientX; lastTY = t.clientY; } } }, {passive:true});
canvas.addEventListener('touchmove', (e) => { for (const t of e.changedTouches){ if (t.identifier === lookId){ camYaw -= (t.clientX-lastTX)*0.005; camPitch = Math.max(PITCH_MIN, Math.min(PITCH_MAX, camPitch - (t.clientY-lastTY)*0.005)); lastTX = t.clientX; lastTY = t.clientY; } } }, {passive:true});
canvas.addEventListener('touchend', (e) => { for (const t of e.changedTouches){ if (t.identifier === lookId) lookId = null; } }, {passive:true});

// ===== minimap (bottom-right): player, monsters, coins, buildings =====
const mmCanvas = document.getElementById('minimap'), mmCtx = mmCanvas ? mmCanvas.getContext('2d') : null;
const MM_RANGE = 115;
function drawMinimap(){
  if (!mmCtx) return;
  const S = mmCanvas.width, c = S/2, rad = c-3, sc = (rad-2)/MM_RANGE;
  mmCtx.clearRect(0,0,S,S);
  mmCtx.save(); mmCtx.beginPath(); mmCtx.arc(c,c,rad,0,6.28); mmCtx.clip();
  mmCtx.fillStyle = 'rgba(6,18,10,.82)'; mmCtx.fillRect(0,0,S,S);
  mmCtx.strokeStyle = 'rgba(57,255,139,.14)'; mmCtx.lineWidth = 1.5; mmCtx.beginPath(); mmCtx.arc(c,c,rad*0.55,0,6.28); mmCtx.stroke();
  mmCtx.fillStyle = 'rgba(185,185,200,.7)';
  for (const m of buildingGroup.children){ mmCtx.fillRect(c+(m.position.x-pos.x)*sc-3, c+(m.position.z-pos.z)*sc-3, 6, 6); }
  mmCtx.fillStyle = '#ffd23a';
  for (const co of coins){ if (!co.visible) continue; mmCtx.beginPath(); mmCtx.arc(c+(co.position.x-pos.x)*sc, c+(co.position.z-pos.z)*sc, 2.4, 0, 6.28); mmCtx.fill(); }
  mmCtx.fillStyle = '#ff4d4d';
  for (const m of monsters){ if (m.state === 'dead') continue; mmCtx.beginPath(); mmCtx.arc(c+(m.pos.x-pos.x)*sc, c+(m.pos.z-pos.z)*sc, 3.2, 0, 6.28); mmCtx.fill(); }
  mmCtx.restore();
  mmCtx.strokeStyle = 'rgba(57,255,139,.55)'; mmCtx.lineWidth = 2; mmCtx.beginPath(); mmCtx.arc(c,c,rad,0,6.28); mmCtx.stroke();
  const fx = Math.sin(faceAngle), fz = Math.cos(faceAngle), px = -fz, py = fx;
  mmCtx.fillStyle = '#39ff8b'; mmCtx.beginPath();
  mmCtx.moveTo(c+fx*8, c+fz*8); mmCtx.lineTo(c-fx*4+px*5, c-fz*4+py*5); mmCtx.lineTo(c-fx*4-px*5, c-fz*4-py*5);
  mmCtx.closePath(); mmCtx.fill();
}
function update(dt){
  if (locked){ lockTimer -= dt; if (lockTimer <= 0) locked = false; }

  let moving = false;
  if (!locked){
    const mF = (keys.f?1:0) - (keys.b?1:0);   // W/S forward-back (camera-relative)
    const mR = (keys.r?1:0) - (keys.l?1:0);   // A/D strafe
    moving = !!(mF || mR);
    if (moving){
      const wx = -Math.sin(camYaw)*mF + Math.cos(camYaw)*mR;   // input -> world, relative to camera
      const wz = -Math.cos(camYaw)*mF - Math.sin(camYaw)*mR;
      const len = Math.hypot(wx, wz) || 1, spd = keys.run ? RUN : WALK;
      pos.x += (wx/len)*spd*dt; pos.z += (wz/len)*spd*dt;
      pos.x = Math.max(-BOUND, Math.min(BOUND, pos.x));
      pos.z = Math.max(-BOUND, Math.min(BOUND, pos.z));
      faceAngle = Math.atan2(wx, wz);                   // face the way we walk
    }
  }
  if (aiming) faceAngle = camYaw + Math.PI;             // face where the camera looks while aiming

  // jump arc
  if (!grounded){ vy -= GRAV*dt; pos.y += vy*dt; if (pos.y <= 0){ pos.y = 0; vy = 0; grounded = true; } }

  // drive the animation
  if (spriteActive){ updateSpriteChar(dt, moving); }
  else if (mixer){
    if (!locked){
      if (!grounded) playClip(CLIP.jump, false);
      else if (moving) playClip(keys.run ? CLIP.run : CLIP.walk, false);
      else playClip(CLIP.idle, false);
    }
    mixer.update(dt);
  }

  // smoothly turn toward the movement direction
  player.rotation.y = angleLerp(player.rotation.y, faceAngle + faceOffset, 1 - Math.pow(0.0001, dt));

  // shadow under the feet, shrinks while airborne
  shadow.position.set(pos.x, 0.02, pos.z);
  const ss = Math.max(0.4, 1 - pos.y*0.12); shadow.scale.set(ss, ss, ss); shadow.material.opacity = 0.3*ss;

  // aim / fire blend
  aimT += ((aiming?1:0) - aimT) * Math.min(1, dt*12);
  if (aiming){ fireTimer -= dt; if (fireTimer <= 0){ fireTimer = FIRE_INTERVAL; fireGun(); } } else fireTimer = 0;
  if (muzzle && muzzle.visible){ muzzleTimer -= dt; if (muzzleTimer <= 0) muzzle.visible = false; }

  // camera: stays behind+above; camPitch tilts the AIM up/down (so you can look at the sky)
  const dist = CAM_DIST * (1 - 0.42*aimT), fov = 55 - 16*aimT;
  if (Math.abs(camera.fov - fov) > 0.05){ camera.fov = fov; camera.updateProjectionMatrix(); }
  const rx = Math.cos(camYaw)*aimT, rz = -Math.sin(camYaw)*aimT;       // over-shoulder side shift while aiming
  const camH = camLookY + 3.4 - 1.6*aimT;
  camTarget.set(pos.x + Math.sin(camYaw)*dist + rx, pos.y + camH, pos.z + Math.cos(camYaw)*dist + rz);
  camera.position.lerp(camTarget, 1 - Math.pow(0.0008, dt));
  const cpp = Math.cos(camPitch);                                       // look target = forward + pitch
  camera.lookAt(
    pos.x - Math.sin(camYaw)*cpp*14,
    pos.y + camLookY + Math.sin(camPitch)*14,
    pos.z - Math.cos(camYaw)*cpp*14
  );
  updateMonsters(dt);
  updateBullets(dt);

  // auto-collect coins just by walking over them, then spin the rest
  tryCollect();
  for (const c of coins){ if (c.visible) c.rotation.y += dt*3; }
}

let last = 0, running = false;
function frame(now){
  if (!running) return;
  const dt = Math.min(0.05, (now - last)/1000 || 0); last = now;
  update(dt);
  renderer.render(scene, camera);
  drawMinimap();
  requestAnimationFrame(frame);
}
function start(){
  if (running) return;
  document.getElementById('load').classList.add('hide');
  running = true; last = performance.now(); requestAnimationFrame(frame);
}
// fallback boot in case an asset never resolves (GLB is ~7MB)
setTimeout(()=>{ if (!running) start(); }, 20000);
</script>
