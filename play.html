<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>$BYEBOSS — WORLD (beta)</title>
<meta name="description" content="$BYEBOSS: WORLD — a 2.5D Three.js forest. Your sprite, in a real 3D world.">
<meta name="theme-color" content="#06040d">
<link rel="icon" type="image/png" href="https://i.ibb.co/pvKhr9Fh/5962780110555385014-Photoroom.png">
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{width:100%;height:100%;overflow:hidden;background:#06040d;
    font-family:'Trebuchet MS',Verdana,system-ui,sans-serif;color:#eafff2;user-select:none;touch-action:none}
  #game{position:fixed;inset:0}
  canvas{position:absolute;inset:0;width:100%;height:100%;display:block}

  .hud{position:absolute;inset:0;pointer-events:none;z-index:5}
  .hud > *{pointer-events:auto}
  .hint{position:absolute;top:14px;left:50%;transform:translateX(-50%);
    background:rgba(6,4,13,.72);border:1px solid rgba(57,255,139,.25);padding:9px 18px;border-radius:999px;
    font-size:13px;letter-spacing:.3px;color:#cdebd9;white-space:nowrap;backdrop-filter:blur(6px);box-shadow:0 6px 22px rgba(0,0,0,.45)}
  .hint b{color:#39ff8b;font-weight:700}
  .brand{position:absolute;top:12px;left:12px;display:flex;align-items:center;gap:10px}
  .brand a.back{display:inline-flex;align-items:center;gap:6px;text-decoration:none;background:rgba(6,4,13,.72);
    border:1px solid rgba(255,255,255,.14);color:#eafff2;padding:8px 12px;border-radius:10px;font-size:13px;font-weight:700;backdrop-filter:blur(6px)}
  .brand a.back:hover{border-color:rgba(57,255,139,.6);color:#39ff8b}
  .brand .title{font-weight:800;font-size:15px;letter-spacing:.4px;text-shadow:0 2px 10px rgba(0,0,0,.7)}
  .brand .title .b{color:#ff3b3b}.brand .title .g{color:#39ff8b}
  .brand .tag{font-size:10px;background:rgba(57,255,139,.16);color:#39ff8b;border:1px solid rgba(57,255,139,.4);
    padding:2px 7px;border-radius:999px;font-weight:700;letter-spacing:.5px}
  .score{position:absolute;top:12px;right:12px;display:flex;align-items:center;gap:8px;background:rgba(6,4,13,.72);
    border:1px solid rgba(255,196,0,.35);padding:8px 14px;border-radius:12px;font-weight:800;font-size:15px;backdrop-filter:blur(6px)}
  .score .coin{width:18px;height:18px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#ffe680,#ffb300 55%,#b87900);
    box-shadow:0 0 8px rgba(255,196,0,.6);display:grid;place-items:center;color:#5a3b00;font-size:11px;font-weight:900}
  .score b{color:#ffd54a}
  .abilities{position:absolute;left:50%;bottom:16px;transform:translateX(-50%);display:flex;gap:12px;z-index:6}
  .ab{position:relative;width:84px;height:88px;border-radius:14px;cursor:pointer;
    background:linear-gradient(180deg,rgba(20,14,34,.78),rgba(10,7,20,.82));border:1px solid rgba(255,255,255,.12);
    backdrop-filter:blur(6px);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;
    transition:transform .08s,border-color .12s,box-shadow .12s}
  .ab:hover{border-color:rgba(57,255,139,.55)}
  .ab:active,.ab.pressed{transform:translateY(2px) scale(.97);border-color:#39ff8b;box-shadow:0 0 0 2px rgba(57,255,139,.35) inset,0 0 18px rgba(57,255,139,.35)}
  .ab .num{position:absolute;top:-9px;left:-9px;width:24px;height:24px;border-radius:8px;background:#0c0a17;
    border:1px solid rgba(255,255,255,.22);display:grid;place-items:center;font-size:12px;font-weight:800;color:#eafff2}
  .ab .ico{font-size:23px;line-height:1;color:#ffb300;filter:drop-shadow(0 0 6px rgba(255,179,0,.5))}
  .ab .lbl{font-size:13px;font-weight:700;letter-spacing:.3px;color:#e7fff3}
  .touch{display:none}
  body.touch .touch{display:block}
  .dpad{position:absolute;left:18px;bottom:118px;width:150px;height:150px;z-index:6}
  .dpad button{position:absolute;width:50px;height:50px;border-radius:12px;background:rgba(20,14,34,.8);
    border:1px solid rgba(255,255,255,.14);color:#cdebd9;font-size:18px;display:grid;place-items:center}
  .dpad button:active{background:rgba(57,255,139,.25);border-color:#39ff8b;color:#fff}
  .dpad .up{left:50px;top:0}.dpad .down{left:50px;top:100px}.dpad .left{left:0;top:50px}.dpad .right{left:100px;top:50px}
  .rbtns{position:absolute;right:18px;bottom:118px;display:flex;flex-direction:column;gap:12px;z-index:6}
  .rbtns button{width:78px;height:54px;border-radius:14px;border:1px solid rgba(255,255,255,.14);background:rgba(20,14,34,.8);
    color:#eafff2;font-weight:800;font-size:13px;letter-spacing:.4px}
  .rbtns button:active{background:rgba(57,255,139,.25);border-color:#39ff8b}
  #load{position:absolute;inset:0;z-index:20;background:#06040d;display:grid;place-items:center;transition:opacity .4s}
  #load.hide{opacity:0;pointer-events:none}
  #load .box{text-align:center}
  #load .logo{font-size:34px;font-weight:900;letter-spacing:1px;margin-bottom:6px}
  #load .logo .b{color:#ff3b3b}#load .logo .g{color:#39ff8b}
  #load .sub{color:#9fb6a8;font-size:13px;margin-bottom:22px;letter-spacing:.5px}
  #load .bar{width:240px;height:8px;border-radius:999px;background:rgba(255,255,255,.08);overflow:hidden;margin:0 auto}
  #load .bar i{display:block;height:100%;width:0;border-radius:999px;background:linear-gradient(90deg,#39ff8b,#7c4dff);transition:width .2s}
  #load .pct{margin-top:10px;font-size:12px;color:#6f8a7c}
  @media (max-width:560px){ .hint{font-size:11px;padding:7px 12px} .ab{width:66px;height:76px}.ab .ico{font-size:19px}.ab .lbl{font-size:11px} .brand .title{font-size:13px} }
</style>
</head>
<body>
<div id="game">
  <canvas id="cv"></canvas>
  <div class="hud">
    <div class="brand">
      <a class="back" href="./game.html" title="Back">‹ Back</a>
      <span class="title"><span class="b">$BYE</span><span class="g">BOSS</span> · WORLD</span>
      <span class="tag">BETA · 3D</span>
    </div>
    <div class="hint"><b>WASD</b> move · <b>SHIFT</b> run · <b>SPACE</b> jump · <b>1–4</b> actions</div>
    <div class="score"><span class="coin">$</span>$BYEBOSS&nbsp;<b id="scoreVal">0</b></div>
    <div class="touch">
      <div class="dpad">
        <button class="up"    data-dir="f">▲</button>
        <button class="down"  data-dir="b">▼</button>
        <button class="left"  data-dir="l">◀</button>
        <button class="right" data-dir="r">▶</button>
      </div>
      <div class="rbtns"><button data-btn="run">RUN</button><button data-btn="jump">JUMP</button></div>
    </div>
    <div class="abilities">
      <div class="ab" data-act="punch"><span class="num">1</span><span class="ico">★</span><span class="lbl">Punch</span></div>
      <div class="ab" data-act="kick"><span class="num">2</span><span class="ico">★</span><span class="lbl">Kick</span></div>
      <div class="ab" data-act="pickup"><span class="num">3</span><span class="ico">★</span><span class="lbl">Pickup</span></div>
      <div class="ab" data-act="attack"><span class="num">4</span><span class="ico">★</span><span class="lbl">Attack</span></div>
    </div>
  </div>
  <div id="load"><div class="box">
    <div class="logo"><span class="b">$BYE</span><span class="g">BOSS</span></div>
    <div class="sub">WORLD · loading the forest…</div>
    <div class="bar"><i id="loadBar"></i></div>
    <div class="pct" id="loadPct">0%</div>
  </div></div>
</div>

<script type="importmap">
{ "imports": { "three": "./assets/vendor/three.module.js" } }
</script>
<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from './assets/vendor/GLTFLoader.js';

// ---------------------------------------------------------------------------
// Renderer / scene / camera
// ---------------------------------------------------------------------------
const canvas = document.getElementById('cv');
const renderer = new THREE.WebGLRenderer({ canvas, antialias:true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
renderer.outputColorSpace = THREE.SRGBColorSpace;

const scene = new THREE.Scene();
const FOG = new THREE.Color('#bfe0cf');         // soft daylight haze (forest)
scene.background = FOG.clone();
scene.fog = new THREE.Fog(FOG.clone(), 24, 95);

const camera = new THREE.PerspectiveCamera(55, 1, 0.1, 400);
function resize(){
  const w = window.innerWidth, h = window.innerHeight;
  renderer.setSize(w, h); camera.aspect = w/h; camera.updateProjectionMatrix();
}
window.addEventListener('resize', resize); resize();

// lights
scene.add(new THREE.HemisphereLight('#eaf6d8', '#33502a', 1.05));
const sun = new THREE.DirectionalLight('#fff6df', 1.15);
sun.position.set(14, 24, 10); scene.add(sun);

// ---------------------------------------------------------------------------
// Asset loading
// ---------------------------------------------------------------------------
const texLoader = new THREE.TextureLoader();
let loaded = 0, total = 0, started = false;
const loadBar = document.getElementById('loadBar'), loadPct = document.getElementById('loadPct');
function asset(){ loaded++; const p = Math.round(loaded/total*100); loadBar.style.width = p+'%'; loadPct.textContent = p+'%';
  if (loaded >= total) start(); }
function tex(url, srgb, repeat){
  total++;
  const t = texLoader.load(url, asset, undefined, asset);
  if (srgb) t.colorSpace = THREE.SRGBColorSpace;
  if (repeat){ t.wrapS = t.wrapT = THREE.RepeatWrapping; t.repeat.set(repeat[0], repeat[1]); }
  return t;
}

// ground (tiled grass) + a dirt trail
const grassTex = tex('./assets/game/kit/floor-ground-grass.png', true, [90,90]);
const ground = new THREE.Mesh(new THREE.PlaneGeometry(260,260), new THREE.MeshLambertMaterial({ map:grassTex }));
ground.rotation.x = -Math.PI/2; scene.add(ground);
const dirtTex = tex('./assets/game/kit/floor-ground-dirt.png', true, [2,90]);
const trail = new THREE.Mesh(new THREE.PlaneGeometry(4.5,260), new THREE.MeshLambertMaterial({ map:dirtTex }));
trail.rotation.x = -Math.PI/2; trail.position.y = 0.02; scene.add(trail);

// (the character is the rigged ByeBoss GLB — loaded further down)

// ---------------------------------------------------------------------------
// World props — GLB trees, lamp posts, bushes
// ---------------------------------------------------------------------------
// Trees: clones of a low-poly GLB, scattered around (skip the trail + spawn).
total++;
new GLTFLoader().load('./assets/game/tree.glb', (gltf) => {
  const tmpl = gltf.scene;
  const minY0 = new THREE.Box3().setFromObject(tmpl).min.y;   // so trunks sit on the ground
  for (let i = 0; i < 70; i++){
    const x = (Math.random()-0.5)*230, z = (Math.random()-0.5)*230;
    if (Math.abs(x) < 3.6 && Math.abs(z) < 70) continue;   // keep the trail clear
    if (Math.abs(x) < 6 && Math.abs(z) < 6) continue;       // keep spawn clear
    const s = 0.9 + Math.random()*0.9;
    const t = tmpl.clone(true);
    t.scale.setScalar(s);
    t.position.set(x, -minY0*s, z);
    t.rotation.y = Math.random()*6.28;
    scene.add(t);
  }
  asset();
}, undefined, (err) => { console.error('tree GLB failed to load', err); asset(); });
// bushes (ground detail)
const bushGeo = new THREE.IcosahedronGeometry(0.5, 0);
const bushMat = new THREE.MeshLambertMaterial({ color:'#2c6e34', flatShading:true });
for (let i=0;i<70;i++){
  const x = (Math.random()-0.5)*220, z = (Math.random()-0.5)*220;
  if (Math.abs(x) < 3 && Math.abs(z) < 70) continue;
  const b = new THREE.Mesh(bushGeo, bushMat);
  b.position.set(x, 0.18, z); b.scale.set(0.5+Math.random()*0.7, 0.4+Math.random()*0.4, 0.5+Math.random()*0.7);
  scene.add(b);
}
// lamp posts (a few cast real light)
const poleGeo = new THREE.CylinderGeometry(0.05, 0.07, 3.2, 6);
const poleMat = new THREE.MeshLambertMaterial({ color:'#23262b' });
const bulbGeo = new THREE.SphereGeometry(0.17, 10, 10);
const bulbMat = new THREE.MeshBasicMaterial({ color:'#ffe6ad' });
for (let i=0;i<9;i++){
  const z = -64 + i*16, x = (i%2 ? 2.8 : -2.8);
  const g = new THREE.Group();
  const p = new THREE.Mesh(poleGeo, poleMat); p.position.y = 1.6; g.add(p);
  const b = new THREE.Mesh(bulbGeo, bulbMat); b.position.y = 3.15; g.add(b);
  if (i < 5){ const L = new THREE.PointLight('#ffd9a0', 7, 17, 2); L.position.y = 3.1; g.add(L); }
  g.position.set(x, 0, z); scene.add(g);
}

// ---------------------------------------------------------------------------
// Character — the rigged ByeBoss GLB (replaces the old 2D billboard)
// ---------------------------------------------------------------------------
const player = new THREE.Group(); scene.add(player);
const pos = player.position;                 // we move this group around
player.rotation.y = Math.PI;                  // spawn facing away from the camera
let mixer = null, curAction = null;
const actions = {}, durations = {};
const CLIP = { idle:'idle', walk:'walk_loop', run:'sprint_loop', jump:'jump_loop',
               punch:'punch_jab', kick:'kick', attack:'sword_attack', pickup:'jump_start' };
const faceOffset = 0;      // facing offset (radians)
const camLookY = 1.2;      // camera look-at height
function playClip(name, once){
  const a = actions[name]; if (!a) return;
  if (a === curAction && a.isRunning() && !once) return;
  if (curAction && curAction !== a) curAction.fadeOut(0.18);
  a.reset(); a.setLoop(once ? THREE.LoopOnce : THREE.LoopRepeat, Infinity); a.clampWhenFinished = once;
  a.fadeIn(0.18).play(); curAction = a;
}
total++;   // the GLB counts as one loadable asset
new GLTFLoader().load('./assets/game/byeboss.glb', (gltf) => {
  const model = gltf.scene;
  model.traverse(o => { o.frustumCulled = false; });
  model.scale.setScalar(2.25);     // tuned size
  model.position.y = 1.052;        // tuned so the feet sit on the ground
  player.add(model);
  mixer = new THREE.AnimationMixer(model);
  for (const clip of gltf.animations){ actions[clip.name] = mixer.clipAction(clip); durations[clip.name] = clip.duration; }
  playClip(CLIP.idle, false);
  asset();
}, undefined, (err) => { console.error('ByeBoss GLB failed to load', err); asset(); });

// soft blob shadow under the character
const shadow = new THREE.Mesh(
  new THREE.CircleGeometry(0.8, 22),
  new THREE.MeshBasicMaterial({ color:0x000000, transparent:true, opacity:0.28, depthWrite:false })
);
shadow.rotation.x = -Math.PI/2; shadow.position.y = 0.02; scene.add(shadow);

// $BYEBOSS coins — a gold token with the logo on each face
const coinGeo = new THREE.CylinderGeometry(0.40, 0.40, 0.09, 28);
const coinSideMat = new THREE.MeshBasicMaterial({ color:'#caa12a' });
const coinCapMat  = new THREE.MeshBasicMaterial({ color:'#ffd23a' });   // logo painted on once it loads
const coinMats = [coinSideMat, coinCapMat, coinCapMat];                  // cylinder groups: [side, top, bottom]
const coins = [];
function spawnCoin(c){
  const a = Math.random()*6.28, r = 6 + Math.random()*70;
  c.position.set(Math.cos(a)*r, 0.75, Math.sin(a)*r); c.visible = true; c.userData.dead = false;
}
for (let i=0;i<14;i++){
  const m = new THREE.Mesh(coinGeo, coinMats); m.rotation.x = Math.PI/2;   // stand the disc upright
  const g = new THREE.Group(); g.add(m); spawnCoin(g); scene.add(g); coins.push(g);
}
let score = 0; const scoreVal = document.getElementById('scoreVal');

// paint the $BYEBOSS logo onto the coin faces (same-origin image -> canvas texture is safe)
(function paintCoin(){
  const img = new Image();
  img.onload = () => {
    const cv = document.createElement('canvas'); cv.width = cv.height = 256;
    const g = cv.getContext('2d');
    const grd = g.createRadialGradient(128,102,16,128,128,132);
    grd.addColorStop(0,'#ffe680'); grd.addColorStop(0.7,'#ffc23a'); grd.addColorStop(1,'#a86f00');
    g.fillStyle = grd; g.beginPath(); g.arc(128,128,126,0,6.28); g.fill();
    g.drawImage(img, 20, 20, 216, 216);                       // round logo, thin gold rim around it
    const t = new THREE.CanvasTexture(cv); t.colorSpace = THREE.SRGBColorSpace;
    coinCapMat.map = t; coinCapMat.color.set('#ffffff'); coinCapMat.needsUpdate = true;
  };
  img.src = './assets/game/byeboss-logo.png';
})();

// ---------------------------------------------------------------------------
// Input
// ---------------------------------------------------------------------------
const keys = { f:false, b:false, l:false, r:false, run:false };
const KEYMAP = { KeyW:'f', ArrowUp:'f', KeyS:'b', ArrowDown:'b', KeyA:'l', ArrowLeft:'l', KeyD:'r', ArrowRight:'r' };
addEventListener('keydown', e=>{
  if (KEYMAP[e.code]){ keys[KEYMAP[e.code]] = true; e.preventDefault(); }
  else if (e.code==='ShiftLeft'||e.code==='ShiftRight') keys.run = true;
  else if (e.code==='Space'){ triggerJump(); e.preventDefault(); }
  else if (e.code==='Digit1') doAction('punch');
  else if (e.code==='Digit2') doAction('kick');
  else if (e.code==='Digit3') doAction('pickup');
  else if (e.code==='Digit4') doAction('attack');
});
addEventListener('keyup', e=>{
  if (KEYMAP[e.code]) keys[KEYMAP[e.code]] = false;
  else if (e.code==='ShiftLeft'||e.code==='ShiftRight') keys.run = false;
});
const abEls = {};
document.querySelectorAll('.ab').forEach(el=>{ const a = el.dataset.act; abEls[a] = el;
  el.addEventListener('pointerdown', ev=>{ ev.preventDefault(); doAction(a); }); });
function flashAbility(a){ const el = abEls[a]; if (!el) return; el.classList.add('pressed'); setTimeout(()=>el.classList.remove('pressed'),160); }
if (('ontouchstart' in window) || navigator.maxTouchPoints>0) document.body.classList.add('touch');
document.querySelectorAll('.dpad button').forEach(b=>{ const d = b.dataset.dir;
  const on = e=>{ e.preventDefault(); keys[d] = true; }, off = e=>{ e.preventDefault(); keys[d] = false; };
  b.addEventListener('pointerdown', on); b.addEventListener('pointerup', off);
  b.addEventListener('pointerleave', off); b.addEventListener('pointercancel', off); });
document.querySelectorAll('.rbtns button').forEach(b=>{ const w = b.dataset.btn;
  if (w==='run'){ b.addEventListener('pointerdown', e=>{ e.preventDefault(); keys.run = true; });
    b.addEventListener('pointerup', e=>{ e.preventDefault(); keys.run = false; }); b.addEventListener('pointerleave', ()=>keys.run=false); }
  else b.addEventListener('pointerdown', e=>{ e.preventDefault(); triggerJump(); }); });

// ---------------------------------------------------------------------------
// Character state / actions
// ---------------------------------------------------------------------------
let locked = false, lockTimer = 0, grounded = true, vy = 0, faceAngle = Math.PI;
let WALK = 7.0, RUN = 13.0, JUMP_V = 8.0; const GRAV = 22;

function doAction(name){
  if (!grounded || locked) return;
  const clip = CLIP[name] || CLIP.punch;
  locked = true; lockTimer = durations[clip] || 0.5;
  playClip(clip, true); flashAbility(name);
  if (name === 'pickup') tryCollect();
}
function triggerJump(){
  if (!grounded || locked) return;
  vy = JUMP_V; grounded = false;
}
function tryCollect(){
  for (const c of coins){ if (c.userData.dead) continue;
    const dx = c.position.x - pos.x, dz = c.position.z - pos.z;
    if (dx*dx + dz*dz < 2.2){ c.userData.dead = true; c.visible = false; score++; scoreVal.textContent = score;
      setTimeout(()=>spawnCoin(c), 6000); }
  }
}
function angleLerp(a, b, t){ let d = ((b - a + Math.PI) % (2*Math.PI)) - Math.PI; if (d < -Math.PI) d += 2*Math.PI; return a + d*t; }

// ---------------------------------------------------------------------------
// Update + render
// ---------------------------------------------------------------------------
const camOff = new THREE.Vector3(0, 4.8, 9.5), camTarget = new THREE.Vector3();
const BOUND = 110;
function update(dt){
  if (locked){ lockTimer -= dt; if (lockTimer <= 0) locked = false; }

  let mx = 0, mz = 0, moving = false;
  if (!locked){
    mx = (keys.r?1:0) - (keys.l?1:0);     // world X
    mz = (keys.b?1:0) - (keys.f?1:0);     // world Z (forward = -Z)
    moving = !!(mx || mz);
    if (moving){
      const len = Math.hypot(mx, mz) || 1, spd = keys.run ? RUN : WALK;
      pos.x += (mx/len)*spd*dt; pos.z += (mz/len)*spd*dt;
      pos.x = Math.max(-BOUND, Math.min(BOUND, pos.x));
      pos.z = Math.max(-BOUND, Math.min(BOUND, pos.z));
      faceAngle = Math.atan2(mx, mz);                   // face the way we walk
    }
  }

  // jump arc
  if (!grounded){ vy -= GRAV*dt; pos.y += vy*dt; if (pos.y <= 0){ pos.y = 0; vy = 0; grounded = true; } }

  // drive the animation
  if (mixer){
    if (!locked){
      if (!grounded) playClip(CLIP.jump, false);
      else if (moving) playClip(keys.run ? CLIP.run : CLIP.walk, false);
      else playClip(CLIP.idle, false);
    }
    mixer.update(dt);
  }

  // smoothly turn toward the movement direction
  player.rotation.y = angleLerp(player.rotation.y, faceAngle + faceOffset, 1 - Math.pow(0.0001, dt));

  // shadow under the feet, shrinks while airborne
  shadow.position.set(pos.x, 0.02, pos.z);
  const ss = Math.max(0.4, 1 - pos.y*0.12); shadow.scale.set(ss, ss, ss); shadow.material.opacity = 0.3*ss;

  // camera follow
  camTarget.copy(pos).add(camOff);
  camera.position.lerp(camTarget, 1 - Math.pow(0.0016, dt));
  camera.lookAt(pos.x, pos.y + camLookY, pos.z);

  // auto-collect coins just by walking over them, then spin the rest
  tryCollect();
  for (const c of coins){ if (c.visible) c.rotation.y += dt*3; }
}

let last = 0, running = false;
function frame(now){
  if (!running) return;
  const dt = Math.min(0.05, (now - last)/1000 || 0); last = now;
  update(dt);
  renderer.render(scene, camera);
  requestAnimationFrame(frame);
}
function start(){
  if (running) return;
  document.getElementById('load').classList.add('hide');
  running = true; last = performance.now(); requestAnimationFrame(frame);
}
// fallback boot in case an asset never resolves (GLB is ~7MB)
setTimeout(()=>{ if (!running) start(); }, 20000);
</script>
</body>
</html>
