<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=0.80, minimum-scale=0.80, maximum-scale=0.80, user-scalable=no">
<title>DexScreener AI — Token Intelligence</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700;800&family=DM+Sans:wght@400;500;600;700&display=swap');

:root {
  --bg: #060a10;
  --bg2: #0b1018;
  --bg3: #101822;
  --sidebar: #090d15;
  --card: #111a26;
  --card-border: #1a2636;
  --cyan: #00d4ff;
  --cyan-dim: rgba(0,212,255,0.12);
  --green: #00ff88;
  --green-dim: rgba(0,255,136,0.10);
  --red: #ff3b4f;
  --red-dim: rgba(255,59,79,0.10);
  --yellow: #ffaa00;
  --yellow-dim: rgba(255,170,0,0.10);
  --orange: #ff6b2b;
  --purple: #b388ff;
  --purple-dim: rgba(179,136,255,0.10);
  --text: #dfe4ed;
  --text2: rgba(255,255,255,0.50);
  --text3: rgba(255,255,255,0.22);
  --mono: 'JetBrains Mono', monospace;
  --sans: 'DM Sans', sans-serif;
}

* { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; overflow:hidden; touch-action: pan-x pan-y; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  -webkit-font-smoothing: antialiased;
  -webkit-text-size-adjust: 100%;
  -webkit-tap-highlight-color: transparent;
  -ms-touch-action: pan-x pan-y;
  touch-action: pan-x pan-y;
}
